<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 · 附近 nearby</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root{
    --bg:#f7f8fa; --card:#ffffff; --ink:#0f1419; --muted:#536471; --faint:#8b98a5;
    --line:#eaecf0; --accent:#1d9bf0; --like:#f91880; --rt:#00ba7c;
    --chen:#3a5a7a; --xia:#c2683f; --jie:#5a7a6a; --luo:#9a6a2a; --lu:#c08a4a;
    --sans:"PingFang SC","Helvetica Neue","Microsoft YaHei",Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .app{max-width:600px;margin:0 auto;background:var(--card);min-height:100vh;border-left:1px solid var(--line);border-right:1px solid var(--line)}

  .nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding:11px 16px;display:flex;align-items:center;gap:14px}
  .nav a.back{font-size:18px;color:var(--ink);text-decoration:none;line-height:1}
  .nav .nt{font-size:16px;font-weight:700}
  .nav .ns{font-size:12px;color:var(--faint)}

  .banner{height:120px;position:relative}
  .pro{padding:0 16px 14px;border-bottom:1px solid var(--line)}
  .pro-av{width:96px;height:96px;border-radius:50%;object-fit:cover;border:4px solid var(--card);margin-top:-48px;background:#e8eaed;cursor:zoom-in;position:relative}
  .pro-name{display:flex;align-items:center;gap:8px;margin-top:10px}
  .pro-name h1{font-size:21px;font-weight:800}
  .pro-mbti{font-size:11px;font-weight:700;letter-spacing:.06em;color:#fff;padding:2px 8px;border-radius:9px}
  .pro-handle{font-size:14px;color:var(--faint);margin-top:1px}
  .pro-role{display:inline-block;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px 10px;margin-top:10px}
  .pro-bio{font-size:14px;line-height:1.65;color:var(--ink);margin-top:12px}
  .pro-quote{font-size:14px;font-style:italic;color:var(--muted);margin-top:10px;padding-left:10px;border-left:3px solid var(--line)}
  .pro-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .ptag{font-size:11.5px;color:var(--muted);background:#f1f3f5;padding:3px 9px;border-radius:9px}
  .pro-rel{margin-top:14px}
  .pro-rel .rh{font-size:13px;font-weight:700;margin-bottom:6px}
  .rel-row{font-size:13px;color:var(--muted);line-height:1.9}
  .rel-row a{color:var(--ink);font-weight:600;text-decoration:none}
  .rel-row a:hover{text-decoration:underline}

  .tabbar{display:flex;border-bottom:1px solid var(--line);position:sticky;top:48px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:10}
  .tabbar .tb{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--muted);padding:12px 0;cursor:pointer;position:relative}
  .tabbar .tb.on{color:var(--ink)}
  .tabbar .tb.on::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:42px;height:3px;border-radius:3px;background:var(--accent)}

  .tw{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .tw:hover{background:#fafbfc}
  .av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#e8eaed}
  .body{flex:1;min-width:0}
  .head{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:14px}
  .nm{font-weight:700}
  .mbti{font-size:10px;font-weight:700;letter-spacing:.06em;color:#fff;padding:1px 6px;border-radius:8px}
  .mbti.chen{background:var(--chen)}.mbti.xia{background:var(--xia)}.mbti.jie{background:var(--jie)}.mbti.luo{background:var(--luo)}.mbti.lu{background:var(--lu)}
  .hd,.dot,.time{color:var(--faint);font-weight:400}
  .txt{font-size:15px;line-height:1.6;margin-top:3px;white-space:pre-wrap;word-break:break-word}
  .media{margin-top:10px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
  .media img{width:100%;display:block;max-height:460px;object-fit:cover;background:#000}
  .media.selfie{position:relative;background:#0f1115}
  .media.selfie .blurbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(28px) brightness(.78);transform:scale(1.15)}
  .media.selfie img.fg{position:relative;width:100%;max-height:600px;object-fit:contain}
  .rtbar{font-size:12.5px;color:var(--muted);margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#fafbfc}
  .rtbar a{color:inherit;text-decoration:none}
  .rtbar b{color:var(--ink);font-weight:600}
  .rtbar .nbadge{display:inline-block;font-size:11px;color:var(--accent);margin-right:5px}
  .acts{display:flex;justify-content:space-between;max-width:300px;margin-top:10px;color:var(--muted)}
  .act{display:flex;align-items:center;gap:6px;font-size:13px}
  .act svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8}
  .act.liked{color:var(--like)} .act.liked svg{fill:var(--like);stroke:var(--like)}
  .day-sep{font-size:12px;color:var(--faint);background:var(--bg);padding:6px 16px;font-weight:600;letter-spacing:.03em}

  .reps{margin-top:4px}
  .rep{display:flex;gap:9px;padding:8px 0 2px}
  .rep .rav{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#e8eaed}
  .rep .rh{font-size:13px}.rep .rnm{font-weight:700}.rep .rto{color:var(--muted);font-size:12.5px}
  .rep .rtx{font-size:14px;line-height:1.5;margin-top:2px}

  .empty,.loading{text-align:center;color:var(--faint);font-size:13px;padding:50px 0}
  .endcap{text-align:center;color:var(--faint);font-size:13px;padding:24px 0 40px}

  .lb{position:fixed;inset:0;background:rgba(15,20,25,.92);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;cursor:zoom-out}
  .lb.on{display:flex}
  .lb img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:14px}
  .lb-x{position:absolute;top:16px;right:20px;color:#fff;font-size:26px;cursor:pointer;opacity:.8}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <a class="back" href="nearby.html">&#8249;</a>
    <div><div class="nt" id="navName">主页</div><div class="ns" id="navCount"></div></div>
  </div>
  <div class="banner" id="banner"></div>
  <div class="pro" id="pro"><div class="loading">LOADING</div></div>
  <div class="tabbar">
    <div class="tb on" data-tab="posts">动态</div>
    <div class="tb" data-tab="media">图片</div>
    <div class="tb" data-tab="about">关于</div>
  </div>
  <div id="stream"></div>
</div>

<div class="lb" id="lightbox"><span class="lb-x" id="lbClose">&times;</span><img id="lbImg" src="" alt=""></div>

<script>
const CHARS_FILE = 'nearby/characters.json';
const FEEDS_FILE = 'nearby/feeds.json';

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);}
function qs(k){return new URLSearchParams(location.search).get(k);}
function relTime(iso){
  if(!iso) return '';
  const t=new Date(iso).getTime(); if(isNaN(t)) return iso;
  let s=Math.floor((Date.now()-t)/1000); if(s<0)s=0;
  if(s<60)return '刚刚';
  const m=Math.floor(s/60); if(m<60)return m+'分钟前';
  const h=Math.floor(m/60); if(h<24)return h+'小时前';
  const d=Math.floor(h/24); if(d<30)return d+'天前';
  const mo=Math.floor(d/30); if(mo<12)return mo+'个月前';
  return Math.floor(mo/12)+'年前';
}
function dayLabel(iso){const d=new Date(iso);if(isNaN(d))return '';return (d.getMonth()+1)+'月'+d.getDate()+'日';}

const ICON={
  c:'<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 17 0z"/></svg>',
  r:'<svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  l:'<svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>'
};

let CHARS={}, ME=null, ALLPOSTS=[], MEDIABASE='';

function mediaURL(src){ if(!src) return ''; return /^https?:\/\//.test(src)?src:MEDIABASE+src; }

function openLb(src){ document.getElementById('lbImg').src=src; document.getElementById('lightbox').classList.add('on'); }

function renderPro(m){
  document.getElementById('navName').textContent=m.name;
  document.getElementById('banner').style.background='linear-gradient(120deg,'+m.color+'33,'+m.color+'11)';
  const portrait=m.portrait?('nearby/'+m.portrait.replace(/^nearby\//,'')):('nearby/'+m.avatar.replace(/^nearby\//,''));
  const rels=(m.relations||[]).map(r=>{const o=CHARS[r.to];return '<div class="rel-row">↔ <a href="u.html?u='+r.to+'">'+esc(o?o.name:r.to)+'</a> · '+esc(r.label)+'</div>';}).join('');
  const tags=(m.tags||[]).map(t=>'<span class="ptag">'+esc(t)+'</span>').join('');
  document.getElementById('pro').innerHTML=
    '<img class="pro-av" id="proAv" src="'+esc(portrait)+'" style="object-position:'+(m.pos||'50% 20%')+'">'
    +'<div class="pro-name"><h1>'+esc(m.name)+'</h1><span class="pro-mbti" style="background:'+m.color+'">'+esc(m.mbti)+'</span></div>'
    +'<div class="pro-handle">'+esc(m.handle)+'</div>'
    +'<div class="pro-role">'+esc(m.role)+'</div>'
    +'<div class="pro-bio">'+esc(m.bio)+'</div>'
    +'<div class="pro-quote">“'+esc(m.quote)+'”</div>'
    +'<div class="pro-tags"><span class="ptag" style="color:'+m.color+'">'+esc(m.tagline)+'</span>'+tags+'</div>'
    +(rels?'<div class="pro-rel"><div class="rh">关系</div>'+rels+'</div>':'');
  document.getElementById('proAv').addEventListener('click',()=>openLb(portrait));
}

function postHTML(p, withReplies){
  const c=CHARS[p.author]||{};
  const st=p.stats||{};
  let media='';
  if(p.image){
    const u=mediaURL(p.image);
    media = p.selfie
      ? '<div class="media selfie"><img class="blurbg" src="'+u+'" aria-hidden="true"><img class="fg" src="'+u+'" loading="lazy" alt=""></div>'
      : '<div class="media"><img src="'+u+'" loading="lazy" alt=""></div>';
  }
  let rt='';
  if(p.repost){
    const inner='🔗 '+(p.repost.news?'<span class="nbadge">AI Briefing</span>':'转发了 ')+'<b>'+esc(p.repost.source)+'</b>：'+esc(p.repost.text);
    rt=p.repost.link?'<div class="rtbar"><a href="'+esc(p.repost.link)+'" target="_blank">'+inner+'</a></div>':'<div class="rtbar">'+inner+'</div>';
  }
  let reps='';
  if(withReplies && p.replies && p.replies.length){
    reps='<div class="reps">'+p.replies.map(r=>{const rc=CHARS[r.author]||{};
      return '<div class="rep"><img class="rav" src="nearby/'+(rc.avatar||'').replace(/^nearby\//,'')+'" style="object-position:'+(rc.pos||'50% 20%')+'"><div><div class="rh"><span class="rnm">'+esc(rc.name)+'</span> <span class="rto">回复 '+esc(r.to||'')+'</span></div><div class="rtx">'+esc(r.text)+'</div></div></div>';
    }).join('')+'</div>';
  }
  return '<div class="tw"><img class="av" src="nearby/'+(c.avatar||'').replace(/^nearby\//,'')+'" style="object-position:'+(c.pos||'50% 20%')+'">'
    +'<div class="body"><div class="head"><span class="nm">'+esc(c.name)+'</span>'
    +'<span class="mbti '+p.author+'">'+esc(c.mbti)+'</span>'
    +'<span class="hd">'+esc(c.handle)+'</span><span class="dot">·</span>'
    +'<span class="time" data-ts="'+esc(p.ts||'')+'">'+relTime(p.ts)+'</span></div>'
    +'<div class="txt">'+esc(p.text)+'</div>'+media+rt
    +'<div class="acts"><span class="act">'+ICON.c+(st.comment??0)+'</span><span class="act">'+ICON.r+(st.repost??0)+'</span><span class="act'+(st.liked?' liked':'')+'">'+ICON.l+(st.like??0)+'</span></div>'
    +reps+'</div></div>';
}

function renderStream(tab){
  const el=document.getElementById('stream');
  if(tab==='about'){
    el.innerHTML='<div style="padding:18px 16px;font-size:14px;line-height:1.8;color:var(--ink)">'
      +'<p style="color:var(--muted);font-size:13px">这是 '+esc(ME.name)+' 在「附近」的全部足迹。共 '+ALLPOSTS.length+' 条动态。</p></div>';
    return;
  }
  let posts=ALLPOSTS.slice();
  if(tab==='media') posts=posts.filter(p=>p.image);
  if(!posts.length){ el.innerHTML='<div class="empty">还没有'+(tab==='media'?'图片':'动态')+'</div>'; return; }
  let html='', lastDay='';
  for(const p of posts){
    const dl=dayLabel(p.ts);
    if(dl && dl!==lastDay){ html+='<div class="day-sep">'+dl+'</div>'; lastDay=dl; }
    html+=postHTML(p, tab==='posts');
  }
  html+='<div class="endcap">— '+esc(ME.name)+' 的全部动态 —</div>';
  el.innerHTML=html;
  el.querySelectorAll('.media img:not(.blurbg)').forEach(im=>im.addEventListener('click',()=>openLb(im.src)));
}

async function load(){
  const key=qs('u')||'chen';
  try{
    const cdata=await (await fetch(CHARS_FILE,{cache:'no-cache'})).json();
    (cdata.members||[]).forEach(m=>CHARS[m.key]=m);
    ME=CHARS[key];
    if(!ME){ document.getElementById('pro').innerHTML='<div class="empty">找不到这个人</div>'; return; }

    const feedsMeta=await (await fetch(FEEDS_FILE,{cache:'no-cache'})).json();
    const files=feedsMeta.feeds||[];
    const datas=await Promise.all(files.map(f=>fetch(f,{cache:'no-cache'}).then(r=>r.ok?r.json():null).catch(()=>null)));
    for(const d of datas){
      if(!d) continue;
      if(!MEDIABASE && d.meta && d.meta.mediaBase) MEDIABASE=d.meta.mediaBase;
      for(const p of (d.posts||[])) if(p.author===key) ALLPOSTS.push(p);
    }
    ALLPOSTS.sort((a,b)=>new Date(b.ts||0)-new Date(a.ts||0));

    renderPro(ME);
    document.getElementById('navCount').textContent=ALLPOSTS.length+' 条动态';
    renderStream('posts');

    document.querySelectorAll('.tabbar .tb').forEach(tb=>tb.addEventListener('click',()=>{
      document.querySelectorAll('.tabbar .tb').forEach(x=>x.classList.remove('on'));
      tb.classList.add('on'); renderStream(tb.getAttribute('data-tab'));
    }));

    const lb=document.getElementById('lightbox');
    lb.addEventListener('click',()=>lb.classList.remove('on'));
    document.getElementById('lbClose').addEventListener('click',()=>lb.classList.remove('on'));
    document.getElementById('lbImg').addEventListener('click',e=>e.stopPropagation());
    document.addEventListener('keydown',e=>{if(e.key==='Escape')lb.classList.remove('on');});

    setInterval(()=>document.querySelectorAll('.time[data-ts]').forEach(el=>{const ts=el.getAttribute('data-ts');if(ts)el.textContent=relTime(ts);}),30000);
  }catch(e){
    document.getElementById('pro').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>';
  }
}
load();
</script>
</body>
</html>
