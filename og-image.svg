<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141413"/>
      <stop offset="100%" style="stop-color:#1C1C1A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Top accent line -->
  <rect x="540" y="0" width="120" height="4" fill="#E05A3E" rx="2"/>
  
  <!-- Double border -->
  <line x1="100" y1="180" x2="1100" y2="180" stroke="#3A3A35" stroke-width="1"/>
  <line x1="100" y1="184" x2="1100" y2="184" stroke="#3A3A35" stroke-width="1"/>
  
  <!-- Title -->
  <text x="600" y="280" font-family="Georgia, 'Playfair Display', serif" font-size="64" font-weight="900" fill="#D4D1C9" text-anchor="middle" letter-spacing="-1">AI Daily Briefing</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="'Helvetica Neue', sans-serif" font-size="18" fill="#6B6960" text-anchor="middle" letter-spacing="6" text-transform="uppercase">INTELLIGENCE · DESIGN · TRENDS</text>
  
  <!-- Bottom line -->
  <line x1="100" y1="420" x2="1100" y2="420" stroke="#3A3A35" stroke-width="1"/>
  <line x1="100" y1="424" x2="1100" y2="424" stroke="#3A3A35" stroke-width="1"/>
  
  <!-- Tagline -->
  <text x="600" y="490" font-family="'Helvetica Neue', sans-serif" font-size="20" fill="#9E9B91" text-anchor="middle">每日 AI 前沿新闻精选</text>
  
  <!-- Author -->
  <text x="600" y="540" font-family="'Courier New', monospace" font-size="14" fill="#6B6960" text-anchor="middle" letter-spacing="2">CURATED BY NATE · POWERED BY WORKBUDDY</text>
  
  <!-- Accent dot -->
  <circle cx="600" cy="580" r="4" fill="#E05A3E"/>
</svg>
