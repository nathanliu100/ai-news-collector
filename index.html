<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新闻速递 | AI Daily Briefing</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- OG Meta: P1 品牌展示 -->
    <meta property="og:title" content="AI Daily Briefing · AI 新闻速递">
    <meta property="og:description" content="每日 AI 前沿新闻精选 — 模型发布、行业动态、设计工具、趋势洞察。Curated by Nate.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nathanliu100.github.io/ai-news-collector/">
    <meta property="og:image" content="https://nathanliu100.github.io/ai-news-collector/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="AI Daily Briefing">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Daily Briefing · AI 新闻速递">
    <meta name="twitter:description" content="每日 AI 前沿新闻精选 — 模型发布、行业动态、设计工具、趋势洞察。">
    <meta name="twitter:image" content="https://nathanliu100.github.io/ai-news-collector/og-image.png">

    <!-- Canonical：避免 UTM 参数导致搜索引擎判重复 -->
    <link rel="canonical" href="https://nathanliu100.github.io/ai-news-collector/">

    <!-- Performance Hints：提前建立关键连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://static.cloudflareinsights.com">

    <!-- marked.js：defer 避免阻塞渲染 -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0849573ed9a843e9a0ed404e42d4e742"}'></script>
    <!-- End Cloudflare Web Analytics -->
</head>
<body>

<header class="masthead" id="masthead">
    <h1 class="masthead-title">AI Daily Briefing</h1>
    <p class="masthead-sub">AI is cool i guess</p>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-inner">
        <div class="nav-left">
            <span class="nav-brand" id="navBrand"><img src="logo.png" alt="" class="nav-logo">AI Briefing</span>
            <button class="nav-btn" onclick="changeDate(-1)" aria-label="Previous day">&#8249;</button>
            <div class="nav-date" id="currentDate"></div>
            <button class="nav-btn" onclick="changeDate(1)" aria-label="Next day">&#8250;</button>
        </div>
        <div class="nav-right">
            <button class="pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
            <button class="pill" data-level="high" onclick="setFilter('high')" data-i18n="filter_critical">Critical</button>
            <button class="pill" data-level="medium" onclick="setFilter('medium')" data-i18n="filter_notable">Notable</button>
            <button class="pill" data-level="low" onclick="setFilter('low')" data-i18n="filter_fyi">FYI</button>
            <button class="lang-toggle" id="langToggle" onclick="toggleLang()" aria-label="Switch language">EN</button>
            <button class="pill-icon" onclick="togglePanel()" aria-label="Archive">&#9776;</button>
        </div>
    </div>
</nav>

<!-- Mode Tabs -->
<div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="daily" onclick="setMode('daily')" data-i18n-daily>Daily</button>
    <button class="mode-tab" data-mode="weekly" onclick="setMode('weekly')" data-i18n-weekly>Weekly</button>
    <a class="mode-tab" href="gallery-mockup.html" data-mode="gallery" data-i18n-gallery>🎬 Gallery</a>
    <button class="mode-tab" data-mode="ideas" onclick="showIdeasGate()" data-i18n-ideas>💡 Ideas</button>
</div>

<!-- Ideas password modal -->
<div class="dev-modal-overlay" id="ideasModal">
    <div class="dev-modal">
        <h4>💡 Ideas Lab</h4>
        <div class="pin-input">
            <input type="number" class="pin-digit ideas-pin" maxlength="1" min="0" max="9" data-idx="0">
            <input type="number" class="pin-digit ideas-pin" maxlength="1" min="0" max="9" data-idx="1">
            <input type="number" class="pin-digit ideas-pin" maxlength="1" min="0" max="9" data-idx="2">
            <input type="number" class="pin-digit ideas-pin" maxlength="1" min="0" max="9" data-idx="3">
        </div>
        <div class="dev-hint" id="ideasHint">Enter PIN to continue</div>
    </div>
</div>

<div class="stats-ribbon" id="statsRibbon">
    <div class="stat">
        <span data-i18n="stat_total">Total</span>
        <span class="stat-num" id="totalCount">&mdash;</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span class="stat-indicator red"></span>
        <span class="stat-num" id="highCount">&mdash;</span>
        <span data-i18n="stat_critical">Critical</span>
    </div>
    <div class="stat">
        <span class="stat-indicator yellow"></span>
        <span class="stat-num" id="mediumCount">&mdash;</span>
        <span data-i18n="stat_notable">Notable</span>
    </div>
    <div class="stat">
        <span class="stat-indicator green"></span>
        <span class="stat-num" id="lowCount">&mdash;</span>
        <span data-i18n="stat_fyi">FYI</span>
    </div>
    <div class="stat stat-rumor">
        <span>&#128276;</span>
        <span class="stat-num" id="rumorCount">&mdash;</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span>&#128240;</span>
        <span class="stat-num" id="mediaCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#120143;</span>
        <span class="stat-num" id="xCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#127970;</span>
        <span class="stat-num" id="officialCount">&mdash;</span>
    </div>
</div>

<main class="main">
    <div id="content">
        <div class="loading">
            <div class="loader"></div>
            <p>LOADING</p>
        </div>
    </div>
</main>

<footer class="footer">
    Curated by <span class="dev-trigger" id="devTrigger">Nate</span> · Powered by WorkBuddy
</footer>

<!-- Dev password modal -->
<div class="dev-modal-overlay" id="devModal">
    <div class="dev-modal">
        <h4>🔐 Dev Access</h4>
        <div class="pin-input">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="0" autofocus>
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="1">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="2">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="3">
        </div>
        <div class="dev-hint" id="devHint">Enter PIN to continue</div>
    </div>
</div>

<!-- Mobile filter bar -->
<div class="mobile-filter-bar" id="mobileFilterBar">
    <button class="m-pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
    <button class="m-pill" data-level="high" onclick="setFilter('high')">🔴</button>
    <button class="m-pill" data-level="medium" onclick="setFilter('medium')">🟡</button>
    <button class="m-pill" data-level="low" onclick="setFilter('low')">🟢</button>
</div>

<!-- Toast -->
<div class="toast" id="toast">🔗 Link copied!</div>

<!-- History Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="panel" id="panel">
    <h3 data-i18n="archive_title">Archive</h3>
    <div id="fileList"></div>
</div>

<script defer src="assets/app.js"></script>

</body>
</html>
