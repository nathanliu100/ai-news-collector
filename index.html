    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --surface-alt: #F5F4F0;
            --border: #E8E6E1;
            --border-strong: #D4D1C9;
            --text: #1A1A18;
            --text-secondary: #6B6960;
            --text-tertiary: #9E9B91;
            --accent: #C8402A;
            --accent-soft: rgba(200, 64, 42, 0.08);
            --ink: #2C2C2A;
            --tag-red: #C8402A;
            --tag-yellow: #B8860B;
            --tag-green: #4A7C59;
            --tag-blue: #3D5A80;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --radius: 4px;
            --mono: 'JetBrains Mono', monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #141413;
                --surface: #1C1C1A;
                --surface-alt: #222220;
                --border: #2E2E2A;
                --border-strong: #3A3A35;
                --text: #EDECEA;
                --text-secondary: #9E9B91;
                --text-tertiary: #6B6960;
                --accent: #E05A3E;
                --accent-soft: rgba(224, 90, 62, 0.1);
                --ink: #D4D1C9;
                --tag-red: #E05A3E;
                --tag-yellow: #D4A017;
                --tag-green: #6BAF7B;
                --tag-blue: #6B9BC3;
                --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            }
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ MASTHEAD (P1: 滚动折叠) ============ */
        .masthead {
            border-bottom: 3px double var(--border-strong);
            padding: 28px 0 20px;
            text-align: center;
            position: relative;
            transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.35s ease;
            max-height: 120px;
            overflow: hidden;
        }

        .masthead.collapsed {
            max-height: 0;
            padding: 0;
            opacity: 0;
            border-bottom-width: 0;
            pointer-events: none;
        }

        .masthead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--accent);
        }

        .masthead-title {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--ink);
        }

        .masthead-sub {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ============ NAV BAR ============ */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            transition: box-shadow 0.3s;
        }

        .nav-bar.scrolled {
            box-shadow: var(--shadow-md);
        }

        /* Compact brand mark in navbar when masthead collapses */
        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 900;
            color: var(--ink);
            letter-spacing: -0.3px;
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: opacity 0.3s, max-width 0.3s;
            white-space: nowrap;
            margin-right: 0;
        }

        .nav-brand.show {
            opacity: 1;
            max-width: 120px;
            margin-right: 12px;
        }

        .nav-inner {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s;
            user-select: none;
        }

        .nav-btn:hover {
            color: var(--text);
            border-color: var(--border);
            background: var(--surface-alt);
        }

        .nav-btn:active { transform: scale(0.95); }

        .nav-date {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            padding: 0 12px;
            min-width: 160px;
            text-align: center;
        }

        .nav-date .weekday {
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 6px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 5px 12px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
            font-family: inherit;
        }

        .pill:hover {
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }

        .pill.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg);
        }

        .pill-icon {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 100px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .pill-icon:hover {
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }

        /* Language toggle */
        .lang-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 5px 10px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
            font-family: var(--mono);
            letter-spacing: 0.5px;
        }

        .lang-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* ============ STATS RIBBON ============ */
        .stats-ribbon {
            max-width: 780px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-indicator.red { background: var(--tag-red); }
        .stat-indicator.yellow { background: var(--tag-yellow); }
        .stat-indicator.green { background: var(--tag-green); }

        .stat-num {
            font-family: var(--mono);
            font-weight: 500;
            color: var(--text);
            font-size: 13px;
        }

        .stat-sep {
            width: 1px;
            height: 12px;
            background: var(--border);
        }

        /* ============ MAIN ============ */
        .main {
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 24px 100px;
        }

        /* ============ LOADING / EMPTY ============ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 0;
            color: var(--text-tertiary);
            gap: 16px;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 100px 0;
        }

        .empty-state .empty-icon {
            font-size: 36px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* ============ NEWS CONTENT ============ */
        .news-content {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* H1 - 大标题 */
        .news-content h1 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.3;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        /* 顶部引用 - 统计摘要 */
        .news-content > blockquote:first-of-type,
        .news-content > blockquote:nth-of-type(2) {
            background: none;
            border-left: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin: 16px 0 28px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* H2 - 分类标题 */
        .news-content h2 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text);
            margin: 40px 0 18px;
            padding: 10px 0;
            border-top: 2px solid var(--text);
            border-bottom: 1px solid var(--border);
            text-transform: none;
            position: relative;
        }

        .news-content h2:first-of-type {
            margin-top: 0;
        }

        /* ============ NEWS BLOCK (P0: 锚点系统 + P1: 排版) ============ */
        .news-block {
            transition: opacity 0.25s ease, max-height 0.3s ease;
            overflow: hidden;
            position: relative;
            scroll-margin-top: 72px;
        }

        .news-block.hidden {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            pointer-events: none;
        }

        /* Anchor highlight animation */
        .news-block.anchor-highlight {
            animation: anchorGlow 2s ease-out;
        }

        @keyframes anchorGlow {
            0% {
                background: var(--accent-soft);
                border-left-color: var(--accent);
            }
            100% {
                background: transparent;
            }
        }

        /* H3 - 新闻条目标题 (P1: 格式塔间距优化) */
        .news-content h3 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            margin: 28px 0 6px;
            color: var(--ink);
            padding-left: 14px;
            border-left: 3px solid var(--border-strong);
            transition: border-color 0.2s;
            position: relative;
        }

        /* Reduce top margin when H3 is first child in block */
        .news-block:first-child h3,
        h2 + .news-block h3 {
            margin-top: 16px;
        }

        .news-content h3:hover {
            border-left-color: var(--accent);
        }

        .news-content h3 a {
            color: inherit;
            text-decoration: none;
            transition: color 0.15s;
        }

        .news-content h3 a:hover {
            color: var(--accent);
        }

        /* P0: 锚点链接按钮 */
        .anchor-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            font-size: 11px;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
            cursor: pointer;
            vertical-align: middle;
            margin-left: 6px;
            border-radius: 3px;
            text-decoration: none;
            position: relative;
            top: -1px;
        }

        .news-block:hover .anchor-link,
        .anchor-link:focus {
            opacity: 1;
        }

        .anchor-link:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* P1: 来源行降权 */
        .news-meta {
            font-size: 11.5px !important;
            color: var(--text-tertiary) !important;
            font-family: var(--mono);
            letter-spacing: 0.2px;
            line-height: 1.6 !important;
            margin-top: 2px !important;
            margin-bottom: 12px !important;
            opacity: 0.75;
            padding-left: 17px;
        }

        /* ============ CREW COMMENTS (折叠式) ============ */
        .crew-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px 14px 4px 6px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.2s;
            margin: 4px 0 8px 17px;
            letter-spacing: 0.3px;
        }

        .crew-toggle:hover {
            border-color: var(--accent);
            color: var(--text-secondary);
            background: var(--accent-soft);
        }

        .crew-toggle .crew-avatars-row {
            display: inline-flex;
            margin-right: 2px;
        }

        .crew-toggle .crew-mini-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1.5px solid var(--bg);
            overflow: hidden;
            margin-left: -6px;
            background: var(--surface-alt);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .crew-toggle .crew-mini-avatar:first-child {
            margin-left: 0;
        }

        .crew-toggle .crew-mini-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .crew-toggle .crew-arrow {
            transition: transform 0.2s;
            font-size: 9px;
        }

        .crew-toggle.open .crew-arrow {
            transform: rotate(180deg);
        }

        .crew-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            margin: 0 0 8px 17px;
        }

        .crew-panel.open {
            max-height: 800px;
        }

        .crew-panel-inner {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface-alt);
            padding: 12px 16px;
        }

        .crew-panel .crew-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .crew-panel .crew-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .crew-panel .crew-item:first-child {
            padding-top: 0;
        }

        .crew-panel .crew-av {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .crew-panel .crew-av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .crew-panel .crew-info {
            flex: 1;
            min-width: 0;
        }

        .crew-panel .crew-nm {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .crew-panel .crew-msg {
            font-size: 12.5px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .crew-panel .crew-msg strong {
            color: var(--text);
        }

        /* 正文段落 */
        .news-content p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin: 4px 0 20px;
            padding-left: 17px;
        }

        .news-content strong {
            color: var(--text);
            font-weight: 600;
        }

        /* 分割线 */
        .news-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 32px 0;
            position: relative;
        }

        .news-content hr::after {
            content: '\25C6';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 12px;
            color: var(--border-strong);
            font-size: 8px;
        }

        /* 列表 */
        .news-content ul, .news-content ol {
            padding-left: 36px;
            margin: 8px 0 20px;
        }

        .news-content li {
            font-size: 14px;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .news-content li strong { color: var(--text); }
        .news-content li::marker { color: var(--text-tertiary); }

        /* P1: 必看红色圆形编号 */
        .news-content > blockquote:first-of-type ~ .must-read-section ol {
            counter-reset: must-read;
            list-style: none;
            padding-left: 0;
        }

        /* Blockquote */
        .news-content blockquote {
            border-left: 2px solid var(--accent);
            padding: 10px 16px;
            margin: 12px 0 20px;
            background: var(--accent-soft);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .news-content code {
            font-family: var(--mono);
            background: var(--surface-alt);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            color: var(--accent);
        }

        /* Table (P1: 移动端卡片化见下方响应式) */
        .news-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 24px;
            font-size: 13px;
        }

        .news-content table th {
            background: var(--surface-alt);
            font-weight: 600;
            color: var(--text);
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid var(--border-strong);
            font-size: 12px;
            letter-spacing: 0.3px;
        }

        .news-content table td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .news-content table tr:hover td {
            background: var(--accent-soft);
        }

        .news-content h2.section-hidden {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .pill .filter-count {
            display: inline-block;
            font-family: var(--mono);
            font-size: 10px;
            margin-left: 4px;
            opacity: 0.7;
        }

        /* ============ TOAST (P0: 复制链接反馈) ============ */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-family: var(--mono);
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 300;
            box-shadow: var(--shadow-md);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============ HISTORY PANEL ============ */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            z-index: 200;
            animation: overlayIn 0.2s ease;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay.show { display: block; }

        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 201;
            padding: 28px 20px;
            overflow-y: auto;
            box-shadow: -8px 0 24px rgba(0,0,0,0.06);
            display: none;
            animation: panelIn 0.25s ease;
        }

        @keyframes panelIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .panel h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .panel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .panel-item::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border-strong);
            flex-shrink: 0;
        }

        .panel-item:hover {
            background: var(--surface-alt);
            color: var(--text);
        }

        .panel-item.active {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .panel-item.active::before {
            background: var(--accent);
        }

        /* ============ MODE TABS ============ */
        .mode-tabs {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .mode-tab {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-tertiary);
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--mono);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            bottom: -1px;
        }

        .mode-tab:hover { color: var(--text-secondary); }

        .mode-tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        /* ============ WEEKLY LONGFORM ============ */
        .weekly-content {
            animation: fadeIn 0.5s ease;
            max-width: 640px;
            margin: 0 auto;
        }

        .weekly-content h1 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 38px;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.2;
            margin: 32px 0 12px;
            letter-spacing: -0.8px;
        }

        .weekly-content h1 + p {
            font-size: 13px;
            font-style: italic;
            color: var(--text-tertiary);
            margin: 0 0 40px;
            padding-left: 0;
            letter-spacing: 0.3px;
            line-height: 1.6;
        }

        .weekly-content p {
            font-size: 15px;
            line-height: 2;
            color: var(--text-secondary);
            margin: 0 0 18px;
            padding-left: 0;
        }

        .weekly-content strong { color: var(--text); font-weight: 600; }

        .weekly-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 40px 0;
            position: relative;
        }

        .weekly-content hr::after {
            content: '\25C6';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 12px;
            color: var(--border-strong);
            font-size: 8px;
        }

        .weekly-content blockquote {
            border-left: 2px solid var(--accent);
            padding: 16px 24px;
            margin: 32px 0;
            background: var(--accent-soft);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.9;
        }

        .weekly-content ul, .weekly-content ol {
            padding-left: 24px;
            margin: 16px 0 28px;
        }

        .weekly-content li {
            font-size: 15px;
            line-height: 2;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .weekly-content li strong { color: var(--text); }
        .weekly-content li::marker { color: var(--text-tertiary); }

        .weekly-content h2 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            margin: 8px 0 20px;
            padding: 0;
            border: none;
            letter-spacing: 0;
        }

        .weekly-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0 32px;
            font-size: 13px;
        }

        .weekly-content table th {
            background: var(--surface-alt);
            font-weight: 600;
            color: var(--text);
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid var(--border-strong);
            font-size: 12px;
            font-family: var(--mono);
        }

        .weekly-content table td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .weekly-content table tr:hover td {
            background: var(--accent-soft);
        }

        .weekly-content code {
            font-family: var(--mono);
            background: var(--surface-alt);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
            color: var(--accent);
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* ============ FOOTER ============ */
        .footer {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px 24px 40px;
            text-align: center;
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
        }

        .footer .dev-trigger {
            color: var(--text-tertiary);
            cursor: default;
            text-decoration: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .footer .dev-trigger:hover {
            color: var(--text-secondary);
            border-bottom-color: var(--text-dim);
        }

        /* Dev password modal */
        .dev-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .dev-modal-overlay.show {
            display: flex;
        }

        .dev-modal {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 320px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dev-modal h4 {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .dev-modal .pin-input {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dev-modal .pin-digit {
            width: 44px;
            height: 52px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }

        .dev-modal .pin-digit::-webkit-outer-spin-button,
        .dev-modal .pin-digit::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dev-modal .pin-digit:focus {
            border-color: var(--accent);
        }

        .dev-modal .pin-digit.error {
            border-color: var(--accent);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .dev-modal .dev-hint {
            font-size: 11px;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 840px) {
            .main { padding: 28px 20px 90px; }
            .stats-ribbon { padding: 12px 20px; gap: 16px; }
        }

        @media (max-width: 640px) {
            .masthead { padding: 18px 16px 14px; border-bottom-width: 2px; }
            .masthead::before { width: 28px; height: 2px; }
            .masthead-title { font-size: 22px; letter-spacing: -0.3px; }
            .masthead-sub { font-size: 9px; letter-spacing: 2.5px; margin-top: 3px; }

            .nav-bar { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
            .nav-inner { padding: 0 12px; height: 48px; }
            .nav-btn { width: 40px; height: 40px; font-size: 18px; -webkit-tap-highlight-color: transparent; }
            .nav-date { font-size: 12px; padding: 0 6px; min-width: auto; }
            .nav-date .weekday { margin-left: 4px; }
            .nav-right .pill[data-level] { display: none; }
            .nav-right { gap: 4px; }
            .lang-toggle { padding: 4px 8px; font-size: 11px; }
            .pill-icon { width: 36px; height: 36px; font-size: 14px; }

            .stats-ribbon {
                padding: 10px 16px;
                gap: 12px;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .stats-ribbon::-webkit-scrollbar { display: none; }
            .stat { white-space: nowrap; flex-shrink: 0; }
            .stat-num { font-size: 12px; }

            .main { padding: 20px 16px 100px; }
            .mobile-filter-bar { display: flex !important; }
            .mode-tabs { padding: 0 16px; }
            .mode-tab { padding: 10px 14px; font-size: 11px; }

            .news-content h1 { font-size: 20px; line-height: 1.35; margin-bottom: 4px; }

            .news-content > blockquote:first-of-type,
            .news-content > blockquote:nth-of-type(2) {
                padding: 12px 14px;
                margin: 12px 0 20px;
                font-size: 12px;
                line-height: 1.7;
            }

            .news-content h2 {
                font-size: 13px;
                letter-spacing: 0.8px;
                margin: 28px 0 14px;
                padding: 8px 0;
            }

            .news-content h3 {
                font-size: 14px;
                line-height: 1.55;
                margin: 18px 0 5px;
                padding-left: 12px;
                border-left-width: 2px;
            }

            .news-content p {
                font-size: 13px;
                line-height: 1.75;
                padding-left: 14px;
                margin: 3px 0 16px;
            }

            .news-meta { padding-left: 14px !important; font-size: 10.5px !important; }

            .news-content ul, .news-content ol {
                padding-left: 28px;
                margin: 6px 0 16px;
            }

            .news-content li { font-size: 13px; line-height: 1.8; }
            .news-content blockquote { padding: 8px 12px; margin: 10px 0 16px; font-size: 12px; }
            .news-content hr { margin: 24px 0; }

            /* P1: Table → 移动端卡片化 */
            .news-content table {
                display: block;
                border: none;
            }
            .news-content table thead { display: none; }
            .news-content table tbody { display: flex; flex-direction: column; gap: 8px; }
            .news-content table tr {
                display: flex;
                flex-direction: column;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 12px;
            }
            .news-content table tr:hover td { background: transparent; }
            .news-content table td {
                display: block;
                padding: 2px 0;
                border: none;
                font-size: 13px;
            }
            .news-content table td:first-child {
                font-weight: 600;
                color: var(--text);
                font-size: 14px;
            }

            /* Anchor link always visible on mobile */
            .anchor-link { opacity: 0.5; }

            .panel { width: 100%; border-left: none; padding: 20px 16px; }
            .panel h3 { font-size: 16px; margin-bottom: 16px; }
            .panel-item { padding: 12px; font-size: 14px; min-height: 44px; }
            .footer { padding: 16px 16px 32px; font-size: 10px; }
            .loading { padding: 60px 0; }
            .empty-state { padding: 60px 0; }
            .empty-state .empty-icon { font-size: 28px; }
            .empty-state h3 { font-size: 17px; }
            .empty-state p { font-size: 12px; }

            .weekly-content { max-width: 100%; }
            .weekly-content h1 { font-size: 28px; margin: 20px 0 8px; }
            .weekly-content h1 + p { margin-bottom: 28px; font-size: 12px; }
            .weekly-content p { font-size: 14px; line-height: 1.9; margin-bottom: 16px; }
            .weekly-content li { font-size: 14px; line-height: 1.9; }
            .weekly-content hr { margin: 36px 0; }
            .weekly-content blockquote { padding: 12px 16px; font-size: 14px; }
            .weekly-content table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                white-space: nowrap;
                font-size: 12px;
            }

            .nav-brand { display: none; }
        }

        @media (max-width: 375px) {
            .masthead-title { font-size: 19px; }
            .nav-date { font-size: 11px; }
            .news-content h1 { font-size: 18px; }
            .news-content h2 { font-size: 12px; }
            .news-content h3 { font-size: 13px; }
            .news-content p { font-size: 12.5px; }
            .weekly-content h1 { font-size: 24px; }
            .weekly-content p { font-size: 14px; line-height: 1.9; }
        }

        /* ============ MOBILE FILTER BAR ============ */
        .mobile-filter-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 150;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .mobile-filter-bar .m-pill {
            flex: 1;
            max-width: 80px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 8px 0;
            border-radius: 100px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            text-align: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-filter-bar .m-pill:active { transform: scale(0.95); }

        .mobile-filter-bar .m-pill.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

<header class="masthead" id="masthead">
    <h1 class="masthead-title">AI Daily Briefing</h1>
    <p class="masthead-sub">Intelligence · Design · Trends</p>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-inner">
        <div class="nav-left">
            <span class="nav-brand" id="navBrand">AI Briefing</span>
            <button class="nav-btn" onclick="changeDate(-1)" aria-label="Previous day">&#8249;</button>
            <div class="nav-date" id="currentDate"></div>
            <button class="nav-btn" onclick="changeDate(1)" aria-label="Next day">&#8250;</button>
        </div>
        <div class="nav-right">
            <button class="pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
            <button class="pill" data-level="high" onclick="setFilter('high')" data-i18n="filter_critical">Critical</button>
            <button class="pill" data-level="medium" onclick="setFilter('medium')" data-i18n="filter_notable">Notable</button>
            <button class="pill" data-level="low" onclick="setFilter('low')" data-i18n="filter_fyi">FYI</button>
            <button class="lang-toggle" id="langToggle" onclick="toggleLang()" aria-label="Switch language">EN</button>
            <button class="pill-icon" onclick="togglePanel()" aria-label="Archive">&#9776;</button>
        </div>
    </div>
</nav>

<!-- Mode Tabs -->
<div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="daily" onclick="setMode('daily')" data-i18n-daily>Daily</button>
    <button class="mode-tab" data-mode="weekly" onclick="setMode('weekly')" data-i18n-weekly>Weekly</button>
</div>

<div class="stats-ribbon" id="statsRibbon">
    <div class="stat">
        <span data-i18n="stat_total">Total</span>
        <span class="stat-num" id="totalCount">&mdash;</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span class="stat-indicator red"></span>
        <span class="stat-num" id="highCount">&mdash;</span>
        <span data-i18n="stat_critical">Critical</span>
    </div>
    <div class="stat">
        <span class="stat-indicator yellow"></span>
        <span class="stat-num" id="mediumCount">&mdash;</span>
        <span data-i18n="stat_notable">Notable</span>
    </div>
    <div class="stat">
        <span class="stat-indicator green"></span>
        <span class="stat-num" id="lowCount">&mdash;</span>
        <span data-i18n="stat_fyi">FYI</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span>&#128240;</span>
        <span class="stat-num" id="mediaCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#120143;</span>
        <span class="stat-num" id="xCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#127970;</span>
        <span class="stat-num" id="officialCount">&mdash;</span>
    </div>
</div>

<main class="main">
    <div id="content">
        <div class="loading">
            <div class="loader"></div>
            <p>LOADING</p>
        </div>
    </div>
</main>

<footer class="footer">
    Curated by <span class="dev-trigger" id="devTrigger">Nate</span> · Powered by WorkBuddy
</footer>

<!-- Dev password modal -->
<div class="dev-modal-overlay" id="devModal">
    <div class="dev-modal">
        <h4>🔐 Dev Access</h4>
        <div class="pin-input">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="0" autofocus>
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="1">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="2">
            <input type="number" class="pin-digit" maxlength="1" min="0" max="9" data-idx="3">
        </div>
        <div class="dev-hint" id="devHint">Enter PIN to continue</div>
    </div>
</div>

<!-- Mobile filter bar -->
<div class="mobile-filter-bar" id="mobileFilterBar">
    <button class="m-pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
    <button class="m-pill" data-level="high" onclick="setFilter('high')">🔴</button>
    <button class="m-pill" data-level="medium" onclick="setFilter('medium')">🟡</button>
    <button class="m-pill" data-level="low" onclick="setFilter('low')">🟢</button>
</div>

<!-- Toast -->
<div class="toast" id="toast">🔗 Link copied!</div>

<!-- History Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="panel" id="panel">
    <h3 data-i18n="archive_title">Archive</h3>
    <div id="fileList"></div>
</div>

<script>
    // ========== I18N ==========
    const i18n = {
        zh: {
            filter_all: '全部', filter_critical: '重大', filter_notable: '关注', filter_fyi: '了解',
            stat_total: '共', stat_critical: '重大', stat_notable: '关注', stat_fyi: '了解',
            archive_title: '历史存档', loading: '加载中',
            no_briefing: '暂无简报', no_briefing_desc: '该日期的自动收集尚未执行。',
            no_weekly: '暂无周报', no_weekly_desc: '该周的周报尚未发布。',
            no_archive: '暂无存档。', scanning: '扫描中…',
            lang_label: 'EN', mode_daily: '日报', mode_weekly: '周报',
            toast_copied: '🔗 链接已复制',
        },
        en: {
            filter_all: 'All', filter_critical: 'Critical', filter_notable: 'Notable', filter_fyi: 'FYI',
            stat_total: 'Total', stat_critical: 'Critical', stat_notable: 'Notable', stat_fyi: 'FYI',
            archive_title: 'Archive', loading: 'LOADING',
            no_briefing: 'No briefing for this date', no_briefing_desc: 'The automation hasn\'t run for this date yet.',
            no_weekly: 'No weekly briefing', no_weekly_desc: 'The weekly briefing hasn\'t been published yet.',
            no_archive: 'No archives found.', scanning: 'Scanning\u2026',
            lang_label: '中文', mode_daily: 'Daily', mode_weekly: 'Weekly',
            toast_copied: '🔗 Link copied',
        }
    };

    function detectLang() {
        const saved = localStorage.getItem('ai-news-lang');
        if (saved) return saved;
        const nav = navigator.language || navigator.userLanguage || 'en';
        return nav.startsWith('zh') ? 'zh' : 'en';
    }

    let currentLang = detectLang();

    function t(key) {
        return (i18n[currentLang] && i18n[currentLang][key]) || (i18n.en[key]) || key;
    }

    function applyI18n() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = t(el.getAttribute('data-i18n'));
        });
        document.getElementById('langToggle').textContent = t('lang_label');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('.m-pill[data-i18n]').forEach(el => {
            el.textContent = t(el.getAttribute('data-i18n'));
        });
        document.querySelector('.mode-tab[data-mode="daily"]').textContent = t('mode_daily');
        document.querySelector('.mode-tab[data-mode="weekly"]').textContent = t('mode_weekly');
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('ai-news-lang', currentLang);
        applyI18n();
        if (currentMode === 'daily') {
            loadNews(fmtDate(currentDate));
        } else {
            loadWeekly();
        }
    }

    // ========== STATE ==========
    let currentDate = new Date();
    let currentFilter = 'all';
    let currentMarkdown = '';
    let currentMode = 'daily';

    // ========== FORMAT ==========
    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function displayDate(d) {
        const wdZh = ['周日','周一','周二','周三','周四','周五','周六'];
        const wdEn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const monthsEn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const wd = currentLang === 'zh' ? wdZh : wdEn;
        if (currentLang === 'zh') {
            return '<span>' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '</span><span class="weekday">' + wd[d.getDay()] + '</span>';
        }
        return '<span>' + monthsEn[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + '</span><span class="weekday">' + wd[d.getDay()] + '</span>';
    }

    // ========== ISO WEEK ==========
    function getISOWeek(d) {
        var date = new Date(d.getTime());
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        var week1 = new Date(date.getFullYear(), 0, 4);
        return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }

    function getISOWeekYear(d) {
        var date = new Date(d.getTime());
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        return date.getFullYear();
    }

    function displayWeek(d) {
        var wn = getISOWeek(d);
        var yr = getISOWeekYear(d);
        if (currentLang === 'zh') return '<span>' + yr + ' 第 ' + wn + ' 周</span>';
        return '<span>' + yr + ' W' + String(wn).padStart(2, '0') + '</span>';
    }

    function weeklyPath(d) {
        var wn = getISOWeek(d);
        var yr = getISOWeekYear(d);
        return 'news/weekly-' + yr + '-W' + String(wn).padStart(2, '0') + '.md';
    }

    // ========== MODE SWITCH ==========
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.mode === mode);
        });
        if (mode === 'daily') {
            document.getElementById('statsRibbon').style.display = '';
            document.querySelectorAll('.pill[data-level]').forEach(function(p) { p.style.display = ''; });
            document.getElementById('mobileFilterBar').style.removeProperty('display');
            document.getElementById('currentDate').innerHTML = displayDate(currentDate);
            loadNews(fmtDate(currentDate));
        } else {
            document.getElementById('statsRibbon').style.display = 'none';
            document.querySelectorAll('.pill[data-level]').forEach(function(p) { p.style.display = 'none'; });
            document.getElementById('mobileFilterBar').style.display = 'none';
            findLatestWeekly().then(function() { loadWeekly(); });
        }
    }

    // ========== NAV ==========
    function changeDate(delta) {
        if (currentMode === 'daily') {
            currentDate.setDate(currentDate.getDate() + delta);
            document.getElementById('currentDate').innerHTML = displayDate(currentDate);
            loadNews(fmtDate(currentDate));
        } else {
            weeklyDate.setDate(weeklyDate.getDate() + delta * 7);
            document.getElementById('currentDate').innerHTML = displayWeek(weeklyDate);
            loadWeekly();
        }
    }

    // ========== P1: MASTHEAD COLLAPSE (IntersectionObserver) ==========
    const mastheadEl = document.getElementById('masthead');
    const navBrandEl = document.getElementById('navBrand');

    const mastheadObserver = new IntersectionObserver(function(entries) {
        const isVisible = entries[0].isIntersecting;
        mastheadEl.classList.toggle('collapsed', !isVisible);
        navBrandEl.classList.toggle('show', !isVisible);
    }, { threshold: 0.1 });

    mastheadObserver.observe(mastheadEl);

    // ========== SCROLL SHADOW ==========
    window.addEventListener('scroll', function() {
        document.getElementById('navBar').classList.toggle('scrolled', window.scrollY > 60);
    });

    // ========== NEWS FILE PATH ==========
    // 周末（周六=6 / 周日=0）优先尝试 -weekend.md，fallback 到普通日报
    function isWeekendDate(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        var dow = d.getDay();
        return dow === 0 || dow === 6;
    }
    function newsPath(dateStr) {
        var suffix = currentLang === 'en' ? '.en.md' : '.md';
        if (isWeekendDate(dateStr)) return 'news/' + dateStr + '-weekend' + suffix;
        return 'news/' + dateStr + suffix;
    }
    // 生成一组候选路径：周末先 weekend、再普通日报；普通日先中文/英文主版，再 fallback 另一语言
    function newsPathCandidates(dateStr) {
        var isWeekend = isWeekendDate(dateStr);
        var primary = currentLang === 'en' ? '.en.md' : '.md';
        var fallbackLang = currentLang === 'en' ? '.md' : '.en.md';
        var list = [];
        if (isWeekend) {
            list.push('news/' + dateStr + '-weekend' + primary);
            list.push('news/' + dateStr + '-weekend' + fallbackLang);
        }
        list.push('news/' + dateStr + primary);
        list.push('news/' + dateStr + fallbackLang);
        return list;
    }

    // ========== LOAD DAILY ==========
    async function loadNews(dateStr) {
        var el = document.getElementById('content');
        el.innerHTML = '<div class="loading"><div class="loader"></div><p>' + t('loading') + '</p></div>';
        currentFilter = 'all';
        document.querySelectorAll('.pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === 'all');
        });
        document.querySelectorAll('.m-pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === 'all');
        });

        try {
            var candidates = newsPathCandidates(dateStr);
            var res = null;
            for (var i = 0; i < candidates.length; i++) {
                var tryRes = await fetch(candidates[i]);
                if (tryRes.ok) { res = tryRes; break; }
            }
            if (!res) throw new Error('not found');
            currentMarkdown = await res.text();
            // Convert crew comment markers to span tags before parsing
            var mdToParse = currentMarkdown
                .replace(/<!--\s*crew:(\w+)\s*-->/g, '<span class="crew-data" data-crew="$1">')
                .replace(/<!--\s*\/crew\s*-->/g, '</span>');
            el.innerHTML = '<div class="news-content">' + marked.parse(mdToParse) + '</div>';
            structureNewsBlocks();
            styleSourceLines();
            addAnchorLinks();
            injectCrewComments();
            updateStats(currentMarkdown);
            handleHashNavigation();
        } catch (e) {
            currentMarkdown = '';
            el.innerHTML = '<div class="empty-state"><div class="empty-icon">&empty;</div><h3>' + t('no_briefing') + '</h3><p>' + t('no_briefing_desc') + '</p></div>';
            resetStats();
        }
    }

    // ========== LOAD WEEKLY ==========
    let weeklyDate = new Date();

    async function loadWeekly() {
        var el = document.getElementById('content');
        el.innerHTML = '<div class="loading"><div class="loader"></div><p>' + t('loading') + '</p></div>';
        document.getElementById('currentDate').innerHTML = displayWeek(weeklyDate);
        var path = weeklyPath(weeklyDate);
        try {
            var res = await fetch(path);
            if (!res.ok) throw new Error('not found');
            var md = await res.text();
            el.innerHTML = '<div class="weekly-content">' + marked.parse(md) + '</div>';
        } catch (e) {
            el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128221;</div><h3>' + t('no_weekly') + '</h3><p>' + t('no_weekly_desc') + '</p></div>';
        }
    }

    async function findLatestWeekly() {
        var d = new Date();
        for (var i = 0; i < 12; i++) {
            var path = weeklyPath(d);
            try {
                var res = await fetch(path, { method: 'HEAD' });
                if (res.ok) { weeklyDate = new Date(d); return; }
            } catch(e){}
            d.setDate(d.getDate() - 7);
        }
        weeklyDate = new Date();
    }

    // ========== STRUCTURE NEWS BLOCKS ==========
    function structureNewsBlocks() {
        var container = document.querySelector('.news-content');
        if (!container) return;
        var children = Array.from(container.children);
        var i = 0;

        while (i < children.length) {
            var el = children[i];
            if (el.tagName === 'H3') {
                var text = el.textContent;
                var level = 'unknown';
                if (text.indexOf('\uD83D\uDD34') >= 0) level = 'high';
                else if (text.indexOf('\uD83D\uDFE1') >= 0) level = 'medium';
                else if (text.indexOf('\uD83D\uDFE2') >= 0) level = 'low';

                var block = document.createElement('div');
                block.className = 'news-block';
                block.dataset.level = level;

                el.parentNode.insertBefore(block, el);
                block.appendChild(el);

                var next = block.nextSibling;
                while (next) {
                    var tag = next.tagName;
                    if (tag === 'H3' || tag === 'H2' || tag === 'HR') break;
                    var toMove = next;
                    next = next.nextSibling;
                    block.appendChild(toMove);
                }

                i = Array.from(container.children).indexOf(block) + 1;
                children = Array.from(container.children);
            } else {
                i++;
            }
        }
    }

    // ========== P1: STYLE SOURCE LINES ==========
    function styleSourceLines() {
        // Find paragraphs that start with **来源** or **Source** and add .news-meta class
        var paras = document.querySelectorAll('.news-block p');
        paras.forEach(function(p) {
            var text = p.textContent.trim();
            if (text.startsWith('来源') || text.startsWith('Source') ||
                (p.querySelector('strong') && (
                    p.querySelector('strong').textContent.startsWith('来源') ||
                    p.querySelector('strong').textContent.startsWith('Source')
                ))) {
                p.classList.add('news-meta');
            }
        });
    }

    // ========== DISABLE SCROLL RESTORATION ==========
    // 防止刷新后浏览器恢复到上次滚动位置
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }

    // ========== P0: ANCHOR LINKS ==========
    var newsCounter = 0;

    function addAnchorLinks() {
        newsCounter = 0;
        var blocks = document.querySelectorAll('.news-block');
        blocks.forEach(function(block) {
            newsCounter++;
            var anchorId = 'news-' + newsCounter;
            block.id = anchorId;

            var h3 = block.querySelector('h3');
            if (h3) {
                var btn = document.createElement('a');
                btn.className = 'anchor-link';
                btn.href = '#' + anchorId;
                btn.innerHTML = '🔗';
                btn.title = currentLang === 'zh' ? '复制链接' : 'Copy link';
                btn.onclick = function(e) {
                    e.preventDefault();
                    var url = window.location.origin + window.location.pathname + '#' + anchorId;
                    // 方案B：标题 + URL，粘贴到 IM 时对方一眼知道是啥
                    var titleText = h3.textContent.replace(/\s*🔗\s*$/, '').trim();
                    var copyText = titleText + '\n' + url;
                    navigator.clipboard.writeText(copyText).then(function() {
                        var shortTitle = titleText.length > 20 ? titleText.slice(0, 20) + '…' : titleText;
                        showToast('🔗 ' + (currentLang === 'zh' ? '已复制「' + shortTitle + '」' : 'Copied "' + shortTitle + '"'));
                    }).catch(function() {
                        // fallback: just show toast without clipboard
                        showToast('🔗 ' + (currentLang === 'zh' ? '请手动复制链接' : 'Please copy link manually'));
                    });
                    // 不修改 URL hash，避免刷新时自动滚动到中间
                };
                h3.appendChild(btn);
            }
        });
    }

    // ========== P0: TOAST ==========
    var toastTimer = null;
    function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
        }, 2000);
    }

    // ========== P0: HASH NAVIGATION (anchor highlight) ==========
    // 首次从链接进来 → 跳到对应新闻；刷新 → 回顶部
    var hashHandledKey = 'anchor_handled_' + window.location.hash;

    function handleHashNavigation() {
        var hash = window.location.hash;
        if (!hash || !hash.startsWith('#news-')) return;

        // 如果这个 hash 已经处理过（说明是刷新），清掉 hash 回顶部
        if (sessionStorage.getItem(hashHandledKey)) {
            history.replaceState(null, '', window.location.pathname + window.location.search);
            window.scrollTo(0, 0);
            return;
        }

        // 首次导航，标记并跳转
        sessionStorage.setItem(hashHandledKey, '1');
        setTimeout(function() {
            var target = document.querySelector(hash);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                target.classList.add('anchor-highlight');
                setTimeout(function() {
                    target.classList.remove('anchor-highlight');
                }, 2500);
            }
        }, 300);
    }

    // Listen for hash changes (e.g. from shared links)
    window.addEventListener('hashchange', function() {
        handleHashNavigation();
    });

    // ========== CREW COMMENTS (折叠式) ==========
    var CREW = {
        elon:       { name: 'Elon Musk',  emoji: '🚀', avatar: 'thinking/avatars/elon.png' },
        jobs:       { name: 'Steve Jobs',  emoji: '🍎', avatar: 'thinking/avatars/jobs.png' },
        wanweigang: { name: '万维钢',      emoji: '📐', avatar: 'thinking/avatars/wanweigang.png' },
        trump:      { name: 'Trump',       emoji: '🏆', avatar: 'thinking/avatars/trump.png' },
        mrbeast:    { name: 'MrBeast',     emoji: '🎬', avatar: 'thinking/avatars/mrbeast.png' }
    };

    function injectCrewComments() {
        var blocks = document.querySelectorAll('.news-block');
        blocks.forEach(function(block) {
            // Find crew-data spans inside this block
            var crewSpans = block.querySelectorAll('span.crew-data');
            if (crewSpans.length === 0) return;

            var comments = [];
            crewSpans.forEach(function(span) {
                comments.push({ key: span.dataset.crew, text: span.innerHTML.trim() });
                span.remove();
            });

            if (comments.length === 0) return;

            // Build toggle button with avatar row
            var avatarsHtml = '<span class="crew-avatars-row">';
            comments.forEach(function(c) {
                var cfg = CREW[c.key] || { emoji: '💬', avatar: '' };
                avatarsHtml += '<span class="crew-mini-avatar"><img src="' + cfg.avatar + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + cfg.emoji + '\'"></span>';
            });
            avatarsHtml += '</span>';

            var toggleId = 'crew-' + Math.random().toString(36).substr(2, 6);

            var toggleBtn = document.createElement('button');
            toggleBtn.className = 'crew-toggle';
            toggleBtn.innerHTML = avatarsHtml + ' ' + comments.length + ' 位数字员工有话说 <span class="crew-arrow">▾</span>';
            toggleBtn.onclick = function() {
                var panel = document.getElementById(toggleId);
                toggleBtn.classList.toggle('open');
                panel.classList.toggle('open');
            };

            // Build panel
            var panelDiv = document.createElement('div');
            panelDiv.className = 'crew-panel';
            panelDiv.id = toggleId;

            var innerHtml = '<div class="crew-panel-inner">';
            comments.forEach(function(c) {
                var cfg = CREW[c.key] || { name: c.key, emoji: '💬', avatar: '' };
                var avContent = '<img src="' + cfg.avatar + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + cfg.emoji + '\'">';
                innerHtml += '<div class="crew-item">';
                innerHtml += '<div class="crew-av">' + avContent + '</div>';
                innerHtml += '<div class="crew-info">';
                innerHtml += '<div class="crew-nm">' + cfg.name + '</div>';
                innerHtml += '<div class="crew-msg">' + marked.parseInline(c.text) + '</div>';
                innerHtml += '</div></div>';
            });
            innerHtml += '</div>';
            panelDiv.innerHTML = innerHtml;

            // Append toggle and panel at end of block
            block.appendChild(toggleBtn);
            block.appendChild(panelDiv);
        });
    }

    // ========== STATS ==========
    function updateStats(md) {
        var h3s = (md.match(/^### /gm) || []).length;
        var highs = (md.match(/^### 🔴/gm) || []).length;
        var meds = (md.match(/^### 🟡/gm) || []).length;
        var lows = (md.match(/^### 🟢/gm) || []).length;
        var media = (md.match(/📰/g) || []).length;
        var xkol = (md.match(/🐦/g) || []).length;
        var official = (md.match(/🏢/g) || []).length;

        document.getElementById('totalCount').textContent = h3s || 0;
        document.getElementById('highCount').textContent = highs;
        document.getElementById('mediumCount').textContent = meds;
        document.getElementById('lowCount').textContent = lows;
        document.getElementById('mediaCount').textContent = media;
        document.getElementById('xCount').textContent = xkol;
        document.getElementById('officialCount').textContent = official;
    }

    function resetStats() {
        ['totalCount','highCount','mediumCount','lowCount','mediaCount','xCount','officialCount']
            .forEach(function(id) { document.getElementById(id).textContent = '\u2014'; });
    }

    // ========== FILTER ==========
    function setFilter(level) {
        currentFilter = level;
        document.querySelectorAll('.pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === level);
        });
        document.querySelectorAll('.m-pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === level);
        });
        applyFilter();
    }

    function applyFilter() {
        var blocks = document.querySelectorAll('.news-block');
        var sections = document.querySelectorAll('.news-content h2');

        blocks.forEach(function(block) {
            if (currentFilter === 'all') {
                block.classList.remove('hidden');
            } else {
                block.classList.toggle('hidden', block.dataset.level !== currentFilter);
            }
        });

        sections.forEach(function(h2) {
            if (currentFilter === 'all') {
                h2.classList.remove('section-hidden');
                return;
            }
            var hasVisible = false;
            var sibling = h2.nextElementSibling;
            while (sibling) {
                if (sibling.tagName === 'H2' || sibling.tagName === 'HR') break;
                if (sibling.classList.contains('news-block') && !sibling.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            h2.classList.toggle('section-hidden', !hasVisible);
        });

        var hrs = document.querySelectorAll('.news-content hr');
        hrs.forEach(function(hr) {
            if (currentFilter === 'all') { hr.style.display = ''; return; }
            var prev = hr.previousElementSibling;
            var prevVisible = false;
            var nextVisible = false;
            while (prev) {
                if (prev.tagName === 'HR') break;
                if ((prev.classList.contains('news-block') && !prev.classList.contains('hidden')) ||
                    (prev.tagName === 'H2' && !prev.classList.contains('section-hidden'))) {
                    prevVisible = true; break;
                }
                prev = prev.previousElementSibling;
            }
            var next = hr.nextElementSibling;
            while (next) {
                if (next.tagName === 'HR') break;
                if ((next.classList.contains('news-block') && !next.classList.contains('hidden')) ||
                    (next.tagName === 'H2' && !next.classList.contains('section-hidden'))) {
                    nextVisible = true; break;
                }
                next = next.nextElementSibling;
            }
            hr.style.display = (prevVisible && nextVisible) ? '' : 'none';
        });
    }

    // ========== PANEL ==========
    function togglePanel() {
        var o = document.getElementById('overlay');
        var p = document.getElementById('panel');
        var isOpen = o.classList.contains('show');
        if (isOpen) {
            o.classList.remove('show');
            p.style.display = 'none';
        } else {
            o.classList.add('show');
            p.style.display = 'block';
            scanFiles();
        }
    }

    async function scanFiles() {
        var el = document.getElementById('fileList');
        el.innerHTML = '<p style="color:var(--text-tertiary);font-size:12px;">' + t('scanning') + '</p>';
        var files = [];
        var today = new Date();
        for (var i = 0; i < 30; i++) {
            var d = new Date(today);
            d.setDate(d.getDate() - i);
            var ds = fmtDate(d);
            try {
                // 周六日优先查 -weekend.md，没有再查普通版
                var isWe = (d.getDay() === 0 || d.getDay() === 6);
                var primary = isWe ? ('news/' + ds + '-weekend.md') : ('news/' + ds + '.md');
                var r = await fetch(primary, { method: 'HEAD' });
                if (r.ok) {
                    files.push({ date: ds, weekend: isWe });
                    continue;
                }
                if (isWe) {
                    // weekend 版不存在就 fallback 到普通版
                    var r2 = await fetch('news/' + ds + '.md', { method: 'HEAD' });
                    if (r2.ok) files.push({ date: ds, weekend: false });
                }
            } catch(e){}
        }
        if (!files.length) {
            el.innerHTML = '<p style="color:var(--text-tertiary);font-size:12px;">' + t('no_archive') + '</p>';
            return;
        }
        el.innerHTML = files.map(function(f) {
            var label = f.weekend ? (f.date + ' 🌴 Weekend') : f.date;
            return '<div class="panel-item ' + (f.date===fmtDate(currentDate)?'active':'') + '" onclick="jumpTo(\'' + f.date + '\')">' + label + '</div>';
        }).join('');
    }

    function jumpTo(ds) {
        currentDate = new Date(ds + 'T00:00:00');
        if (currentMode === 'weekly') setMode('daily');
        document.getElementById('currentDate').innerHTML = displayDate(currentDate);
        loadNews(ds);
        togglePanel();
    }

    // ========== INIT ==========
    applyI18n();
    document.getElementById('currentDate').innerHTML = displayDate(currentDate);
    loadNews(fmtDate(currentDate));

    // ========== DEV MODE EASTER EGG ==========
    (function() {
        var PIN = '9527';
        var modal = document.getElementById('devModal');
        var trigger = document.getElementById('devTrigger');
        var hint = document.getElementById('devHint');
        var digits = modal.querySelectorAll('.pin-digit');

        trigger.addEventListener('click', function() {
            modal.classList.add('show');
            digits.forEach(function(d) { d.value = ''; d.classList.remove('error'); });
            hint.textContent = 'Enter PIN to continue';
            hint.style.color = '';
            setTimeout(function() { digits[0].focus(); }, 100);
        });

        // 点击遮罩关闭
        modal.addEventListener('click', function(e) {
            if (e.target === modal) modal.classList.remove('show');
        });

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                modal.classList.remove('show');
            }
        });

        // 输入逻辑：输入一个数字自动跳下一格
        digits.forEach(function(input, idx) {
            input.addEventListener('input', function() {
                var val = this.value;
                // 只保留最后一个字符
                if (val.length > 1) this.value = val.slice(-1);
                this.classList.remove('error');

                if (this.value && idx < 3) {
                    digits[idx + 1].focus();
                }

                // 检查是否 4 位都填了
                var code = '';
                digits.forEach(function(d) { code += d.value; });
                if (code.length === 4) {
                    if (code === PIN) {
                        hint.textContent = '✅ Access granted';
                        hint.style.color = 'var(--green)';
                        setTimeout(function() {
                            modal.classList.remove('show');
                            window.location.href = 'thinking/index.html';
                        }, 600);
                    } else {
                        hint.textContent = '❌ Wrong PIN';
                        hint.style.color = 'var(--accent)';
                        digits.forEach(function(d) { d.classList.add('error'); });
                        setTimeout(function() {
                            digits.forEach(function(d) { d.value = ''; d.classList.remove('error'); });
                            hint.textContent = 'Enter PIN to continue';
                            hint.style.color = '';
                            digits[0].focus();
                        }, 800);
                    }
                }
            });

            // Backspace 跳回上一格
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && idx > 0) {
                    digits[idx - 1].focus();
                    digits[idx - 1].value = '';
                }
            });

            // 粘贴支持（直接粘 4 位数）
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                var pasted = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (/^\d{4}$/.test(pasted)) {
                    digits.forEach(function(d, i) { d.value = pasted[i]; });
                    digits[3].focus();
                    // 触发检查
                    digits[3].dispatchEvent(new Event('input'));
                }
            });
        });
    })();
</script>

</body>
</html>
