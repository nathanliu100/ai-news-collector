<html lang="zh-CN">
<head>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Canonical -->
    <link rel="canonical" href="https://nathanliu100.github.io/ai-news-collector/gallery-mockup.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://static.cloudflareinsights.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/gallery.css">

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0849573ed9a843e9a0ed404e42d4e742"}'></script>
    <!-- End Cloudflare Web Analytics -->
</head>
<body>

    <!-- Masthead（与主站一致） -->
    <header class="masthead">
        <h1 class="masthead-title">AI Daily Briefing</h1>
        <p class="masthead-sub">AI is cool i guess</p>
    </header>

    <!-- Nav Bar（与主站一致的结构） -->
    <nav class="nav-bar" id="navBar">
        <div class="nav-inner">
            <div class="nav-left">
                <span class="nav-brand"><img src="logo.png" alt="" class="nav-logo">AI Briefing</span>
            </div>
            <div class="nav-right">
            </div>
        </div>
    </nav>

    <!-- Mode Tabs（与主站统一） -->
    <div class="mode-tabs">
        <a class="mode-tab" href="index.html">日报</a>
        <a class="mode-tab" href="index.html?mode=weekly">周报</a>
        <a class="mode-tab active" href="gallery-mockup.html">🎬 作品</a>
    </div>

    <!-- 页头 Hero -->
    <section class="gallery-hero">
        <div class="hero-label">AI Creative Gallery · 作品精选</div>
        <h1 class="hero-title">
            值得反复观看的 <em>AI 影像</em><br>
            来自全球创作者
        </h1>
        <p class="hero-subtitle">
            一个持续更新的 AI 视频作品集。从 Kling 的电影感长镜头到 Higgsfield 的角色一致性，
            从 Runway 的创意剪辑到即梦的中式叙事 — 每一个作品都附带编辑的技术拆解和落地启示。
        </p>
    </section>

    <!-- 筛选信息条 -->
    <section class="filter-bar">
        <div class="filter-group">
            <span class="filter-label">Tools</span>
            <button class="filter-chip active">全部</button>
            <button class="filter-chip">Higgsfield</button>
            <button class="filter-chip">Kling</button>
            <button class="filter-chip">Runway</button>
            <button class="filter-chip">Veo</button>
            <button class="filter-chip">即梦</button>
        </div>
        <span class="filter-count">加载中…</span>
    </section>

    <!-- Gallery 网格（由 gallery.js 从 gallery-data.json 动态渲染） -->
    <section class="gallery-grid">
        <p style="text-align:center;padding:60px 20px;color:#888;font-family:'JetBrains Mono',monospace;font-size:13px;">作品加载中…</p>
    </section>

    <script defer src="assets/gallery.js"></script>
</body>
</html>
