<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新闻速递 | AI Daily Briefing</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --surface-alt: #F5F4F0;
            --border: #E8E6E1;
            --border-strong: #D4D1C9;
            --text: #1A1A18;
            --text-secondary: #6B6960;
            --text-tertiary: #9E9B91;
            --accent: #C8402A;
            --accent-soft: rgba(200, 64, 42, 0.08);
            --ink: #2C2C2A;
            --tag-red: #C8402A;
            --tag-yellow: #B8860B;
            --tag-green: #4A7C59;
            --tag-blue: #3D5A80;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --radius: 4px;
            /* P0-NEW: Hero card variables */
            --hero-bg: #FDF6F4;
            --hero-border: rgba(200, 64, 42, 0.15);
            --hero-num: #C8402A;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #141413;
                --surface: #1C1C1A;
                --surface-alt: #222220;
                --border: #2E2E2A;
                --border-strong: #3A3A35;
                --text: #EDECEA;
                --text-secondary: #9E9B91;
                --text-tertiary: #6B6960;
                --accent: #E05A3E;
                --accent-soft: rgba(224, 90, 62, 0.1);
                --ink: #D4D1C9;
                --tag-red: #E05A3E;
                --tag-yellow: #D4A017;
                --tag-green: #6BAF7B;
                --tag-blue: #6B9BC3;
                --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
                /* P0-NEW: Dark mode hero */
                --hero-bg: rgba(224, 90, 62, 0.06);
                --hero-border: rgba(224, 90, 62, 0.12);
                --hero-num: #E05A3E;
            }
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ MASTHEAD ============ */
        .masthead {
            border-bottom: 3px double var(--border-strong);
            padding: 28px 0 20px;
            text-align: center;
            position: relative;
        }

        .masthead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--accent);
        }

        .masthead-title {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--ink);
        }

        .masthead-sub {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ============ NAV BAR ============ */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            transition: box-shadow 0.3s;
        }

        .nav-bar.scrolled {
            box-shadow: var(--shadow-md);
        }

        .nav-inner {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s;
            user-select: none;
        }

        .nav-btn:hover {
            color: var(--text);
            border-color: var(--border);
            background: var(--surface-alt);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            padding: 0 12px;
            min-width: 160px;
            text-align: center;
        }

        .nav-date .weekday {
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 6px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 5px 12px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
            font-family: inherit;
        }

        .pill:hover {
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }

        .pill.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg);
        }

        .pill-icon {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 100px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .pill-icon:hover {
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }

        /* Language toggle */
        .lang-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 5px 10px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .lang-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* ============ STATS RIBBON ============ */
        .stats-ribbon {
            max-width: 780px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-indicator.red { background: var(--tag-red); }
        .stat-indicator.yellow { background: var(--tag-yellow); }
        .stat-indicator.green { background: var(--tag-green); }

        .stat-num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--text);
            font-size: 13px;
        }

        .stat-sep {
            width: 1px;
            height: 12px;
            background: var(--border);
        }

        /* ============ MAIN ============ */
        .main {
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 24px 100px;
        }

        /* ============ LOADING / EMPTY ============ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 0;
            color: var(--text-tertiary);
            gap: 16px;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 100px 0;
        }

        .empty-state .empty-icon {
            font-size: 36px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* ============ NEWS CONTENT ============ */
        .news-content {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* H1 - 大标题 */
        .news-content h1 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.3;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        /* 顶部引用 - 统计摘要 */
        .news-content > blockquote:first-of-type,
        .news-content > blockquote:nth-of-type(2) {
            background: none;
            border-left: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin: 16px 0 28px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* H2 - 分类标题 */
        .news-content h2 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text);
            margin: 40px 0 18px;
            padding: 10px 0;
            border-top: 2px solid var(--text);
            border-bottom: 1px solid var(--border);
            text-transform: none;
            position: relative;
        }

        .news-content h2:first-of-type {
            margin-top: 0;
        }

        /* H3 - 新闻条目标题 */
        .news-content h3 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            margin: 24px 0 6px;
            color: var(--ink);
            padding-left: 14px;
            border-left: 3px solid var(--border-strong);
            transition: border-color 0.2s;
            /* P0-NEW: scroll-margin for anchor jumps */
            scroll-margin-top: 72px;
        }

        .news-content h3:hover {
            border-left-color: var(--accent);
        }

        .news-content h3 a {
            color: inherit;
            text-decoration: none;
            transition: color 0.15s;
        }

        .news-content h3 a:hover {
            color: var(--accent);
        }

        /* 正文段落 */
        .news-content p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin: 4px 0 20px;
            padding-left: 17px;
        }

        .news-content strong {
            color: var(--text);
            font-weight: 600;
        }

        /* 分割线 */
        .news-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 32px 0;
            position: relative;
        }

        .news-content hr::after {
            content: '\25C6';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 12px;
            color: var(--border-strong);
            font-size: 8px;
        }

        /* 列表 */
        .news-content ul, .news-content ol {
            padding-left: 36px;
            margin: 8px 0 20px;
        }

        .news-content li {
            font-size: 14px;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .news-content li strong {
            color: var(--text);
        }

        .news-content li::marker {
            color: var(--text-tertiary);
        }

        /* Blockquote（非首个） */
        .news-content blockquote {
            border-left: 2px solid var(--accent);
            padding: 10px 16px;
            margin: 12px 0 20px;
            background: var(--accent-soft);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .news-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--surface-alt);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            color: var(--accent);
        }

        /* Table styling */
        .news-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 24px;
            font-size: 13px;
        }

        .news-content table th {
            background: var(--surface-alt);
            font-weight: 600;
            color: var(--text);
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid var(--border-strong);
            font-size: 12px;
            letter-spacing: 0.3px;
        }

        .news-content table td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .news-content table tr:hover td {
            background: var(--accent-soft);
        }

        /* ============ P0-NEW: ANCHOR HIGHLIGHT ============ */
        @keyframes anchorPulse {
            0% { background: rgba(200, 64, 42, 0.15); }
            50% { background: rgba(200, 64, 42, 0.08); }
            100% { background: transparent; }
        }

        @media (prefers-color-scheme: dark) {
            @keyframes anchorPulse {
                0% { background: rgba(224, 90, 62, 0.2); }
                50% { background: rgba(224, 90, 62, 0.1); }
                100% { background: transparent; }
            }
        }

        .news-block.anchor-highlight {
            animation: anchorPulse 2s ease-out;
            border-radius: var(--radius);
        }

        .news-block.anchor-highlight h3 {
            border-left-color: var(--accent) !important;
        }

        /* P0-NEW: Anchor link button on hover */
        .news-content h3 {
            position: relative;
        }

        .anchor-link {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.15s;
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: var(--radius);
        }

        .anchor-link:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .news-block:hover .anchor-link {
            opacity: 1;
        }

        /* Anchor link copied toast */
        .anchor-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
            pointer-events: none;
        }

        .anchor-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============ P0-NEW: HERO SECTION — 今日必看 ============ */
        .hero-must-read {
            margin: 0 0 8px;
            animation: fadeIn 0.5s ease;
        }

        .hero-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .hero-header h2 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text);
            margin: 0;
            padding: 10px 0;
            border-top: 2px solid var(--text);
            border-bottom: 1px solid var(--border);
            flex: 1;
        }

        .hero-cards {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .hero-card {
            display: flex;
            gap: 16px;
            padding: 18px 20px;
            background: var(--hero-bg);
            border-left: 3px solid var(--accent);
            border-bottom: 1px solid var(--hero-border);
            transition: all 0.2s ease;
            cursor: default;
            position: relative;
            scroll-margin-top: 72px;
        }

        .hero-card:first-child {
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .hero-card:last-child {
            border-radius: 0 0 var(--radius) var(--radius);
            border-bottom: none;
        }

        .hero-card:only-child {
            border-radius: var(--radius);
            border-bottom: none;
        }

        .hero-card:hover {
            background: var(--accent-soft);
        }

        .hero-card-num {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--hero-num);
            opacity: 0.35;
            line-height: 1;
            min-width: 32px;
            text-align: center;
            padding-top: 2px;
            user-select: none;
        }

        .hero-card-body {
            flex: 1;
            min-width: 0;
        }

        .hero-card-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .hero-card-title a {
            color: inherit;
            text-decoration: none;
        }

        .hero-card-title a:hover {
            color: var(--accent);
        }

        .hero-card-desc {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-card-tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .hero-tag {
            font-size: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 100px;
            background: rgba(200, 64, 42, 0.1);
            color: var(--accent);
        }

        /* Hero card anchor highlight */
        .hero-card.anchor-highlight {
            animation: heroHighlight 2s ease-out;
        }

        @keyframes heroHighlight {
            0% { background: rgba(200, 64, 42, 0.2); box-shadow: 0 0 0 2px var(--accent); }
            50% { background: rgba(200, 64, 42, 0.12); box-shadow: 0 0 0 1px rgba(200,64,42,0.3); }
            100% { background: var(--hero-bg); box-shadow: none; }
        }

        @media (prefers-color-scheme: dark) {
            @keyframes heroHighlight {
                0% { background: rgba(224, 90, 62, 0.2); box-shadow: 0 0 0 2px var(--accent); }
                50% { background: rgba(224, 90, 62, 0.12); box-shadow: 0 0 0 1px rgba(224,90,62,0.3); }
                100% { background: var(--hero-bg); box-shadow: none; }
            }
        }

        /* Hero card anchor link */
        .hero-card .hero-anchor-link {
            position: absolute;
            top: 12px;
            right: 12px;
            opacity: 0;
            transition: opacity 0.15s;
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: var(--radius);
        }

        .hero-card .hero-anchor-link:hover {
            color: var(--accent);
            background: rgba(200, 64, 42, 0.1);
        }

        .hero-card:hover .hero-anchor-link {
            opacity: 1;
        }

        /* ============ HISTORY PANEL ============ */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            z-index: 200;
            animation: overlayIn 0.2s ease;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay.show { display: block; }

        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 201;
            padding: 28px 20px;
            overflow-y: auto;
            box-shadow: -8px 0 24px rgba(0,0,0,0.06);
            display: none;
            animation: panelIn 0.25s ease;
        }

        @keyframes panelIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .panel h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .panel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .panel-item::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border-strong);
            flex-shrink: 0;
        }

        .panel-item:hover {
            background: var(--surface-alt);
            color: var(--text);
        }

        .panel-item.active {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .panel-item.active::before {
            background: var(--accent);
        }

        /* ============ FILTER VISIBILITY ============ */
        .news-block {
            transition: opacity 0.25s ease, max-height 0.3s ease;
            overflow: hidden;
        }

        .news-block.hidden {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            pointer-events: none;
        }

        .news-content h2.section-hidden {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        /* Active filter count badge */
        .pill .filter-count {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            margin-left: 4px;
            opacity: 0.7;
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* ============ FOOTER ============ */
        .footer {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px 24px 40px;
            text-align: center;
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
        }

        /* ============ MODE TABS (Daily / Weekly) ============ */
        .mode-tabs {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .mode-tab {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-tertiary);
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            bottom: -1px;
        }

        .mode-tab:hover {
            color: var(--text-secondary);
        }

        .mode-tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        /* ============ WEEKLY / EDITORIAL LONGFORM ============ */
        .weekly-content {
            animation: fadeIn 0.5s ease;
            max-width: 640px;
            margin: 0 auto;
        }

        .weekly-content h1 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 38px;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.2;
            margin: 32px 0 12px;
            letter-spacing: -0.8px;
            text-align: left;
        }

        .weekly-content h1 + p {
            font-size: 13px;
            font-style: italic;
            color: var(--text-tertiary);
            margin: 0 0 40px;
            padding-left: 0;
            letter-spacing: 0.3px;
            line-height: 1.6;
        }

        .weekly-content p {
            font-size: 15px;
            line-height: 2;
            color: var(--text-secondary);
            margin: 0 0 18px;
            padding-left: 0;
        }

        .weekly-content strong {
            color: var(--text);
            font-weight: 600;
        }

        .weekly-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 40px 0;
            position: relative;
        }

        .weekly-content hr::after {
            content: '\25C6';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 12px;
            color: var(--border-strong);
            font-size: 8px;
        }

        .weekly-content blockquote {
            border-left: 2px solid var(--accent);
            padding: 16px 24px;
            margin: 32px 0;
            background: var(--accent-soft);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.9;
        }

        .weekly-content ul, .weekly-content ol {
            padding-left: 24px;
            margin: 16px 0 28px;
        }

        .weekly-content li {
            font-size: 15px;
            line-height: 2;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .weekly-content li strong {
            color: var(--text);
        }

        .weekly-content li::marker {
            color: var(--text-tertiary);
        }

        .weekly-content h2 {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            margin: 8px 0 20px;
            padding: 0;
            border: none;
            letter-spacing: 0;
            text-transform: none;
        }

        .weekly-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0 32px;
            font-size: 13px;
        }

        .weekly-content table th {
            background: var(--surface-alt);
            font-weight: 600;
            color: var(--text);
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid var(--border-strong);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .weekly-content table td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .weekly-content table tr:hover td {
            background: var(--accent-soft);
        }

        .weekly-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--surface-alt);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
            color: var(--accent);
        }

        /* Weekly mobile */
        @media (max-width: 640px) {
            .weekly-content { max-width: 100%; }
            .weekly-content h1 { font-size: 28px; margin: 20px 0 8px; }
            .weekly-content h1 + p { margin-bottom: 28px; font-size: 12px; }
            .weekly-content p { font-size: 14px; line-height: 1.9; margin-bottom: 16px; }
            .weekly-content li { font-size: 14px; line-height: 1.9; }
            .weekly-content hr { margin: 36px 0; }
            .weekly-content blockquote { padding: 12px 16px; font-size: 14px; }
            .weekly-content table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                white-space: nowrap;
                font-size: 12px;
            }
        }

        @media (max-width: 375px) {
            .weekly-content h1 { font-size: 24px; }
            .weekly-content p { font-size: 14px; line-height: 1.9; }
        }

        /* ============ RESPONSIVE — MOBILE ============ */

        /* --- Tablet breakpoint --- */
        @media (max-width: 840px) {
            .main { padding: 28px 20px 90px; }
            .stats-ribbon { padding: 12px 20px; gap: 16px; }
        }

        /* --- Mobile breakpoint --- */
        @media (max-width: 640px) {
            .masthead {
                padding: 18px 16px 14px;
                border-bottom-width: 2px;
            }
            .masthead::before { width: 28px; height: 2px; }
            .masthead-title { font-size: 22px; letter-spacing: -0.3px; }
            .masthead-sub { font-size: 9px; letter-spacing: 2.5px; margin-top: 3px; }

            .nav-bar { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
            .nav-inner { padding: 0 12px; height: 48px; }
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
                -webkit-tap-highlight-color: transparent;
            }
            .nav-date {
                font-size: 12px;
                padding: 0 6px;
                min-width: auto;
            }
            .nav-date .weekday { margin-left: 4px; }

            .nav-right .pill[data-level] { display: none; }

            .nav-right { gap: 4px; }
            .lang-toggle { padding: 4px 8px; font-size: 11px; }
            .pill-icon { width: 36px; height: 36px; font-size: 14px; }

            .stats-ribbon {
                padding: 10px 16px;
                gap: 12px;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .stats-ribbon::-webkit-scrollbar { display: none; }
            .stat { white-space: nowrap; flex-shrink: 0; }
            .stat-num { font-size: 12px; }

            .main { padding: 20px 16px 100px; }

            .mobile-filter-bar {
                display: flex !important;
            }

            .mode-tabs { padding: 0 16px; }
            .mode-tab { padding: 10px 14px; font-size: 11px; }

            .news-content h1 {
                font-size: 20px;
                line-height: 1.35;
                margin-bottom: 4px;
            }

            .news-content > blockquote:first-of-type,
            .news-content > blockquote:nth-of-type(2) {
                padding: 12px 14px;
                margin: 12px 0 20px;
                font-size: 12px;
                line-height: 1.7;
            }

            .news-content h2 {
                font-size: 13px;
                letter-spacing: 0.8px;
                margin: 28px 0 14px;
                padding: 8px 0;
            }

            .news-content h3 {
                font-size: 14px;
                line-height: 1.55;
                margin: 18px 0 5px;
                padding-left: 12px;
                border-left-width: 2px;
            }

            .news-content p {
                font-size: 13px;
                line-height: 1.75;
                padding-left: 14px;
                margin: 3px 0 16px;
            }

            .news-content ul, .news-content ol {
                padding-left: 28px;
                margin: 6px 0 16px;
            }

            .news-content li {
                font-size: 13px;
                line-height: 1.8;
            }

            .news-content blockquote {
                padding: 8px 12px;
                margin: 10px 0 16px;
                font-size: 12px;
            }

            .news-content hr { margin: 24px 0; }

            .news-content table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                white-space: nowrap;
                font-size: 12px;
                margin: 12px -16px 20px;
                padding: 0 16px;
                width: calc(100% + 32px);
            }

            .news-content table th {
                padding: 8px 10px;
                font-size: 11px;
            }

            .news-content table td {
                padding: 7px 10px;
                font-size: 12px;
            }

            .panel {
                width: 100%;
                border-left: none;
                padding: 20px 16px;
                border-radius: 0;
            }

            .panel h3 { font-size: 16px; margin-bottom: 16px; }

            .panel-item {
                padding: 12px;
                font-size: 14px;
                min-height: 44px;
            }

            .footer {
                padding: 16px 16px 32px;
                font-size: 10px;
            }

            .loading { padding: 60px 0; }
            .empty-state { padding: 60px 0; }
            .empty-state .empty-icon { font-size: 28px; }
            .empty-state h3 { font-size: 17px; }
            .empty-state p { font-size: 12px; }

            /* P0-NEW: Hero mobile */
            .hero-card {
                padding: 14px 14px;
                gap: 12px;
            }

            .hero-card-num {
                font-size: 24px;
                min-width: 24px;
            }

            .hero-card-title {
                font-size: 14px;
            }

            .hero-card-desc {

            }

            .hero-card-tags {

            }

                font-size: 9px;
            }

            .anchor-link, .hero-anchor-link {
                display: none;
            }
        }

        /* --- Small phone (iPhone SE etc.) --- */
        @media (max-width: 375px) {
            .masthead-title { font-size: 19px; }
            .nav-date { font-size: 11px; }
            .news-content h1 { font-size: 18px; }
            .news-content h2 { font-size: 12px; }
            .news-content h3 { font-size: 13px; }
            .news-content p { font-size: 12.5px; }

            .hero-card-num { font-size: 20px; min-width: 20px; }
            .hero-card-title { font-size: 13px; }
        }

        /* ============ MOBILE FILTER BAR ============ */
        .mobile-filter-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 150;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .mobile-filter-bar .m-pill {
            flex: 1;
            max-width: 80px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            padding: 8px 0;
            border-radius: 100px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            text-align: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-filter-bar .m-pill:active {
            transform: scale(0.95);
        }

        .mobile-filter-bar .m-pill.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

<header class="masthead">
    <h1 class="masthead-title">AI Daily Briefing</h1>
    <p class="masthead-sub">Intelligence · Design · Trends</p>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-inner">
        <div class="nav-left">
            <button class="nav-btn" onclick="changeDate(-1)" aria-label="Previous day">&#8249;</button>
            <div class="nav-date" id="currentDate"></div>
            <button class="nav-btn" onclick="changeDate(1)" aria-label="Next day">&#8250;</button>
        </div>
        <div class="nav-right">
            <button class="pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
            <button class="pill" data-level="high" onclick="setFilter('high')" data-i18n="filter_critical">Critical</button>
            <button class="pill" data-level="medium" onclick="setFilter('medium')" data-i18n="filter_notable">Notable</button>
            <button class="pill" data-level="low" onclick="setFilter('low')" data-i18n="filter_fyi">FYI</button>
            <button class="lang-toggle" id="langToggle" onclick="toggleLang()" aria-label="Switch language">EN</button>
            <button class="pill-icon" onclick="togglePanel()" aria-label="Archive">&#9776;</button>
        </div>
    </div>
</nav>

<!-- Mode Tabs -->
<div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="daily" onclick="setMode('daily')" data-i18n-daily>Daily</button>
    <button class="mode-tab" data-mode="weekly" onclick="setMode('weekly')" data-i18n-weekly>Weekly</button>
</div>

<div class="stats-ribbon" id="statsRibbon">
    <div class="stat">
        <span data-i18n="stat_total">Total</span>

    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span class="stat-indicator red"></span>
        <span class="stat-num" id="highCount">&mdash;</span>

    </div>
    <div class="stat">
        <span class="stat-indicator yellow"></span>
        <span class="stat-num" id="mediumCount">&mdash;</span>
        <span data-i18n="stat_notable">Notable</span>
    </div>
    <div class="stat">
        <span class="stat-indicator green"></span>
        <span class="stat-num" id="lowCount">&mdash;</span>
        <span data-i18n="stat_fyi">FYI</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
        <span>&#128240;</span>
        <span class="stat-num" id="mediaCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#120143;</span>
        <span class="stat-num" id="xCount">&mdash;</span>
    </div>
    <div class="stat">
        <span>&#127970;</span>
        <span class="stat-num" id="officialCount">&mdash;</span>
    </div>
</div>

<main class="main">
    <div id="content">
        <div class="loading">
            <div class="loader"></div>
            <p>LOADING</p>
        </div>
    </div>
</main>

<footer class="footer">
    Curated by Nate · Powered by WorkBuddy
</footer>

<!-- Mobile floating filter bar -->
<div class="mobile-filter-bar" id="mobileFilterBar">
    <button class="m-pill active" data-level="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
    <button class="m-pill" data-level="high" onclick="setFilter('high')">🔴</button>
    <button class="m-pill" data-level="medium" onclick="setFilter('medium')">🟡</button>
    <button class="m-pill" data-level="low" onclick="setFilter('low')">🟢</button>
</div>

<!-- Anchor toast -->
<div class="anchor-toast" id="anchorToast"></div>

<!-- History Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="panel" id="panel">
    <h3 data-i18n="archive_title">Archive</h3>
    <div id="fileList"></div>
</div>

<script>
    // ========== I18N ==========
    const i18n = {
        zh: {
            filter_all: '全部',
            filter_critical: '重大',
            filter_notable: '关注',
            filter_fyi: '了解',
            stat_total: '共',
            stat_critical: '重大',
            stat_notable: '关注',
            stat_fyi: '了解',
            archive_title: '历史存档',
            loading: '加载中',
            no_briefing: '暂无简报',
            no_briefing_desc: '该日期的自动收集尚未执行。',
            no_weekly: '暂无周报',
            no_weekly_desc: '该周的周报尚未发布。',
            no_archive: '暂无存档。',
            scanning: '扫描中…',
            lang_label: 'EN',
            mode_daily: '日报',
            mode_weekly: '周报',
            anchor_copied: '🔗 链接已复制',
        },
        en: {
            filter_all: 'All',
            filter_critical: 'Critical',
            filter_notable: 'Notable',
            filter_fyi: 'FYI',
            stat_total: 'Total',
            stat_critical: 'Critical',
            stat_notable: 'Notable',
            stat_fyi: 'FYI',
            archive_title: 'Archive',
            loading: 'LOADING',
            no_briefing: 'No briefing for this date',
            no_briefing_desc: 'The automation hasn\'t run for this date yet.',
            no_weekly: 'No weekly briefing',
            no_weekly_desc: 'The weekly briefing hasn\'t been published yet.',
            no_archive: 'No archives found.',
            scanning: 'Scanning\u2026',
            lang_label: '中文',
            mode_daily: 'Daily',
            mode_weekly: 'Weekly',
            anchor_copied: '🔗 Link copied',
        }
    };

    function detectLang() {
        const saved = localStorage.getItem('ai-news-lang');
        if (saved) return saved;
        const nav = navigator.language || navigator.userLanguage || 'en';
        return nav.startsWith('zh') ? 'zh' : 'en';
    }

    let currentLang = detectLang();

    function t(key) {
        return (i18n[currentLang] && i18n[currentLang][key]) || (i18n.en[key]) || key;
    }

    function applyI18n() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = t(el.getAttribute('data-i18n'));
        });
        document.getElementById('langToggle').textContent = t('lang_label');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('.m-pill[data-i18n]').forEach(el => {
            el.textContent = t(el.getAttribute('data-i18n'));
        });
        document.querySelector('.mode-tab[data-mode="daily"]').textContent = t('mode_daily');
        document.querySelector('.mode-tab[data-mode="weekly"]').textContent = t('mode_weekly');
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('ai-news-lang', currentLang);
        applyI18n();
        if (currentMode === 'daily') {
            loadNews(fmtDate(currentDate));
        } else {
            loadWeekly();
        }
    }

    // ========== STATE ==========
    let currentDate = new Date();
    let currentFilter = 'all';
    let currentMarkdown = '';
    let currentMode = 'daily';

    // ========== FORMAT ==========
    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function displayDate(d) {
        const wdZh = ['周日','周一','周二','周三','周四','周五','周六'];
        const wdEn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const monthsEn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const wd = currentLang === 'zh' ? wdZh : wdEn;
        if (currentLang === 'zh') {
            return '<span>' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '</span><span class="weekday">' + wd[d.getDay()] + '</span>';
        }
        return '<span>' + monthsEn[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + '</span><span class="weekday">' + wd[d.getDay()] + '</span>';
    }

    // ========== ISO WEEK NUMBER ==========
    function getISOWeek(d) {
        var date = new Date(d.getTime());
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        var week1 = new Date(date.getFullYear(), 0, 4);
        return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }

    function getISOWeekYear(d) {
        var date = new Date(d.getTime());
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        return date.getFullYear();
    }

    function displayWeek(d) {
        var wn = getISOWeek(d);
        var yr = getISOWeekYear(d);
        if (currentLang === 'zh') {
            return '<span>' + yr + ' 第 ' + wn + ' 周</span>';
        }
        return '<span>' + yr + ' W' + String(wn).padStart(2, '0') + '</span>';
    }

    function weeklyPath(d) {
        var wn = getISOWeek(d);
        var yr = getISOWeekYear(d);
        return 'news/weekly-' + yr + '-W' + String(wn).padStart(2, '0') + '.md';
    }

    // ========== MODE SWITCH ==========
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.mode === mode);
        });

        if (mode === 'daily') {
            document.getElementById('statsRibbon').style.display = '';
            document.querySelectorAll('.pill[data-level]').forEach(function(p) { p.style.display = ''; });
            document.getElementById('mobileFilterBar').style.removeProperty('display');
            document.getElementById('currentDate').innerHTML = displayDate(currentDate);
            loadNews(fmtDate(currentDate));
        } else {
            document.getElementById('statsRibbon').style.display = 'none';
            document.querySelectorAll('.pill[data-level]').forEach(function(p) { p.style.display = 'none'; });
            document.getElementById('mobileFilterBar').style.display = 'none';
            findLatestWeekly().then(function() {
                loadWeekly();
            });
        }
    }

    // ========== NAV ==========
    function changeDate(delta) {
        if (currentMode === 'daily') {
            currentDate.setDate(currentDate.getDate() + delta);
            document.getElementById('currentDate').innerHTML = displayDate(currentDate);
            loadNews(fmtDate(currentDate));
        } else {
            weeklyDate.setDate(weeklyDate.getDate() + delta * 7);
            document.getElementById('currentDate').innerHTML = displayWeek(weeklyDate);
            loadWeekly();
        }
    }

    // ========== SCROLL SHADOW ==========
    window.addEventListener('scroll', function() {
        document.getElementById('navBar').classList.toggle('scrolled', window.scrollY > 60);
    });

    // ========== NEWS FILE PATH ==========
    function newsPath(dateStr) {
        if (currentLang === 'en') {
            return 'news/' + dateStr + '.en.md';
        }
        return 'news/' + dateStr + '.md';
    }

    // ========== P0-NEW: GENERATE ANCHOR ID FROM TEXT ==========
    function textToAnchorId(text) {
        // Remove emoji, level indicators, source tags, and special chars
        var clean = text
            .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]/gu, '')
            .replace(/🔴|🟡|🟢|🆕|🔄|📌|💎|🎯|📰|🐦|🏢/g, '')
            .replace(/\[.*?\]/g, '')  // remove [link text]
            .replace(/\(.*?\)/g, '')  // remove (url)
            .trim();
        // Convert to URL-friendly slug
        return clean
            .toLowerCase()
            .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '')
            .substring(0, 60);
    }

    // ========== P0-NEW: EXTRACT MUST-READ FROM MARKDOWN ==========
    function extractMustRead(md) {
        var lines = md.split('\n');
        var inMustRead = false;
        var items = [];
        var currentItem = null;

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            // Detect must-read section
            if (/^## ⚡/.test(line)) {
                inMustRead = true;
                continue;
            }

            // End of must-read section
            if (inMustRead && (/^---$/.test(line) || /^## /.test(line))) {
                break;
            }

            if (inMustRead) {
                // Numbered list item: "1. 🔴 **Title**: Description"
                var match = line.match(/^\d+\.\s*(🔴|🟡|🟢)?\s*\*\*(.*?)\*\*[：:]\s*(.*)/);
                if (match) {
                    if (currentItem) items.push(currentItem);
                    currentItem = {
                        level: match[1] || '',
                        title: match[2].trim(),
                        desc: match[3].trim(),
                        raw: line
                    };
                } else if (currentItem && line.trim() && !/^\d+\./.test(line.trim())) {
                    // Continuation of previous item
                    currentItem.desc += ' ' + line.trim();
                }
            }
        }
        if (currentItem) items.push(currentItem);
        return items;
    }

    // ========== P0-NEW: BUILD HERO SECTION ==========
    function buildHeroSection(items, dateStr) {
        if (!items.length) return '';

        var html = '<div class="hero-must-read">';
        html += '<div class="hero-header"><h2>⚡ ' + (currentLang === 'zh' ? '今日必看' : "Today's Must-Read") + '</h2></div>';
        html += '<div class="hero-cards">';

        items.forEach(function(item, idx) {
            var anchorId = 'must-read-' + (idx + 1);
            var tags = [];
            if (item.desc.indexOf('💎') >= 0) tags.push(currentLang === 'zh' ? '部门相关' : 'Team');
            if (item.desc.indexOf('🎯') >= 0) tags.push(currentLang === 'zh' ? '重点工具' : 'Key Tool');

            html += '<div class="hero-card" id="' + anchorId + '">';
            html += '<button class="hero-anchor-link" onclick="copyAnchorLink(\'' + anchorId + '\', event)" title="Copy link">🔗</button>';
            html += '<div class="hero-card-num">' + (idx + 1) + '</div>';
            html += '<div class="hero-card-body">';
            html += '<div class="hero-card-title">' + item.title + '</div>';
            html += '<div class="hero-card-desc">' + item.desc.replace(/\[💎.*?\]/g, '').replace(/\[🎯.*?\]/g, '').trim() + '</div>';
            if (tags.length) {
                html += '<div class="hero-card-tags">';
                tags.forEach(function(tag) {
                    html += '<span class="hero-tag">' + tag + '</span>';
                });
                html += '</div>';
            }
            html += '</div></div>';
        });

        html += '</div></div>';
        return html;
    }

    // ========== LOAD DAILY ==========
    async function loadNews(dateStr) {
        var el = document.getElementById('content');
        el.innerHTML = '<div class="loading"><div class="loader"></div><p>' + t('loading') + '</p></div>';
        currentFilter = 'all';
        document.querySelectorAll('.pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === 'all');
        });
        document.querySelectorAll('.m-pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === 'all');
        });

        try {
            var res = await fetch(newsPath(dateStr));
            if (!res.ok) {
                var fallback = currentLang === 'en' ? ('news/' + dateStr + '.md') : ('news/' + dateStr + '.en.md');
                res = await fetch(fallback);
                if (!res.ok) throw new Error('not found');
            }
            currentMarkdown = await res.text();

            // P0-NEW: Extract must-read items BEFORE rendering
            var mustReadItems = extractMustRead(currentMarkdown);

            // Render the full markdown (but we'll replace the must-read section visually)
            var fullHtml = marked.parse(currentMarkdown);

            // Build hero section
            var heroHtml = buildHeroSection(mustReadItems, dateStr);

            // Insert hero + rest of content
            el.innerHTML = heroHtml + '<div class="news-content">' + fullHtml + '</div>';

            // P0-NEW: Hide the original "今日必看" section from the rendered markdown
            hideOriginalMustRead();

            // Structure news blocks and add anchors
            structureNewsBlocks();
            addAnchors();
            updateStats(currentMarkdown);

            // P0-NEW: Handle hash navigation after load
            handleHashNavigation();
        } catch (e) {
            currentMarkdown = '';
            el.innerHTML = '<div class="empty-state"><div class="empty-icon">&empty;</div><h3>' + t('no_briefing') + '</h3><p>' + t('no_briefing_desc') + '</p></div>';
            resetStats();
        }
    }

    // ========== P0-NEW: HIDE ORIGINAL MUST-READ SECTION ==========
    function hideOriginalMustRead() {
        var container = document.querySelector('.news-content');
        if (!container) return;

        var children = Array.from(container.children);
        var hiding = false;
        var toHide = [];

        for (var i = 0; i < children.length; i++) {
            var el = children[i];

            // Find the "⚡ 今日必看" H2
            if (el.tagName === 'H2' && el.textContent.indexOf('⚡') >= 0) {
                hiding = true;
                toHide.push(el);
                continue;
            }

            // Stop hiding at next HR or next H2
            if (hiding && (el.tagName === 'HR' || (el.tagName === 'H2' && el.textContent.indexOf('⚡') < 0))) {
                // Also hide the HR that follows must-read
                if (el.tagName === 'HR') toHide.push(el);
                break;
            }

            if (hiding) {
                toHide.push(el);
            }
        }

        toHide.forEach(function(el) {
            el.style.display = 'none';
        });
    }

    // ========== LOAD WEEKLY ==========
    let weeklyDate = new Date();

    async function loadWeekly() {
        var el = document.getElementById('content');
        el.innerHTML = '<div class="loading"><div class="loader"></div><p>' + t('loading') + '</p></div>';
        document.getElementById('currentDate').innerHTML = displayWeek(weeklyDate);

        var path = weeklyPath(weeklyDate);
        try {
            var res = await fetch(path);
            if (!res.ok) throw new Error('not found');
            var md = await res.text();
            el.innerHTML = '<div class="weekly-content">' + marked.parse(md) + '</div>';
        } catch (e) {
            el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128221;</div><h3>' + t('no_weekly') + '</h3><p>' + t('no_weekly_desc') + '</p></div>';
        }
    }

    async function findLatestWeekly() {
        var d = new Date();
        for (var i = 0; i < 12; i++) {
            var path = weeklyPath(d);
            try {
                var res = await fetch(path, { method: 'HEAD' });
                if (res.ok) {
                    weeklyDate = new Date(d);
                    return;
                }
            } catch(e){}
            d.setDate(d.getDate() - 7);
        }
        weeklyDate = new Date();
    }

    // ========== STRUCTURE NEWS BLOCKS ==========
    function structureNewsBlocks() {
        var container = document.querySelector('.news-content');
        if (!container) return;

        var children = Array.from(container.children);
        var i = 0;

        while (i < children.length) {
            var el = children[i];

            if (el.tagName === 'H3') {
                var text = el.textContent;
                var level = 'unknown';
                if (text.indexOf('\uD83D\uDD34') >= 0) level = 'high';
                else if (text.indexOf('\uD83D\uDFE1') >= 0) level = 'medium';
                else if (text.indexOf('\uD83D\uDFE2') >= 0) level = 'low';

                var block = document.createElement('div');
                block.className = 'news-block';
                block.dataset.level = level;

                el.parentNode.insertBefore(block, el);
                block.appendChild(el);

                var next = block.nextSibling;
                while (next) {
                    var tag = next.tagName;
                    if (tag === 'H3' || tag === 'H2' || tag === 'HR') break;
                    var toMove = next;
                    next = next.nextSibling;
                    block.appendChild(toMove);
                }

                i = Array.from(container.children).indexOf(block) + 1;
                children = Array.from(container.children);
            } else {
                i++;
            }
        }
    }

    // ========== P0-NEW: ADD ANCHOR IDS TO ALL NEWS BLOCKS ==========
    function addAnchors() {
        var blocks = document.querySelectorAll('.news-block');
        var idCounter = {};

        blocks.forEach(function(block) {
            var h3 = block.querySelector('h3');
            if (!h3) return;

            var anchorId = textToAnchorId(h3.textContent);
            if (!anchorId) anchorId = 'news-' + Math.random().toString(36).substr(2, 6);

            // Handle duplicate IDs
            if (idCounter[anchorId]) {
                idCounter[anchorId]++;
                anchorId = anchorId + '-' + idCounter[anchorId];
            } else {
                idCounter[anchorId] = 1;
            }

            block.id = anchorId;
            h3.style.scrollMarginTop = '72px';

            // Add copy-link button
            var linkBtn = document.createElement('button');
            linkBtn.className = 'anchor-link';
            linkBtn.innerHTML = '🔗';
            linkBtn.title = 'Copy link';
            linkBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                copyAnchorLink(anchorId, e);
            };
            h3.appendChild(linkBtn);
        });
    }

    // ========== P0-NEW: COPY ANCHOR LINK ==========
    function copyAnchorLink(anchorId, event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }

        var baseUrl = window.location.origin + window.location.pathname;
        var dateStr = fmtDate(currentDate);
        var fullUrl = baseUrl + '?date=' + dateStr + '#' + anchorId;

        navigator.clipboard.writeText(fullUrl).then(function() {
            showToast(t('anchor_copied'));
        }).catch(function() {
            // Fallback
            var ta = document.createElement('textarea');
            ta.value = fullUrl;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(t('anchor_copied'));
        });

        // Update URL without reload
        history.replaceState(null, '', '?date=' + dateStr + '#' + anchorId);
    }

    function showToast(msg) {
        var toast = document.getElementById('anchorToast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() {
            toast.classList.remove('show');
        }, 2000);
    }

    // ========== P0-NEW: HANDLE HASH NAVIGATION ==========
    function handleHashNavigation() {
        var hash = window.location.hash;
        if (!hash) return;

        var targetId = hash.substring(1);
        var target = document.getElementById(targetId);
        if (!target) return;

        // Wait for layout
        setTimeout(function() {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Add highlight animation
            target.classList.add('anchor-highlight');
            setTimeout(function() {
                target.classList.remove('anchor-highlight');
            }, 2500);
        }, 300);
    }

    // ========== P0-NEW: HANDLE URL PARAMS ==========
    function handleUrlParams() {
        var params = new URLSearchParams(window.location.search);
        var dateParam = params.get('date');
        if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
            currentDate = new Date(dateParam + 'T00:00:00');
        }
    }

    // Listen for hash changes
    window.addEventListener('hashchange', function() {
        handleHashNavigation();
    });

    // ========== STATS ==========
    function updateStats(md) {
        var h3s = (md.match(/^### /gm) || []).length;
        var highs = (md.match(/^### 🔴/gm) || []).length;
        var meds = (md.match(/^### 🟡/gm) || []).length;
        var lows = (md.match(/^### 🟢/gm) || []).length;
        var media = (md.match(/📰/g) || []).length;
        var xkol = (md.match(/🐦/g) || []).length;
        var official = (md.match(/🏢/g) || []).length;

        document.getElementById('totalCount').textContent = h3s || 0;
        document.getElementById('highCount').textContent = highs;
        document.getElementById('mediumCount').textContent = meds;
        document.getElementById('lowCount').textContent = lows;
        document.getElementById('mediaCount').textContent = media;
        document.getElementById('xCount').textContent = xkol;
        document.getElementById('officialCount').textContent = official;
    }

    function resetStats() {
        ['totalCount','highCount','mediumCount','lowCount','mediaCount','xCount','officialCount']
            .forEach(function(id) { document.getElementById(id).textContent = '\u2014'; });
    }

    // ========== FILTER ==========
    function setFilter(level) {
        currentFilter = level;
        document.querySelectorAll('.pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === level);
        });
        document.querySelectorAll('.m-pill[data-level]').forEach(function(b) {
            b.classList.toggle('active', b.dataset.level === level);
        });
        applyFilter();
    }

    function applyFilter() {
        var blocks = document.querySelectorAll('.news-block');
        var sections = document.querySelectorAll('.news-content h2');

        // P0-NEW: Also handle hero section visibility with filter
        var heroSection = document.querySelector('.hero-must-read');
        if (heroSection) {
            if (currentFilter === 'all' || currentFilter === 'high') {
                heroSection.style.display = '';
            } else {
                heroSection.style.display = 'none';
            }
        }

        blocks.forEach(function(block) {
            if (currentFilter === 'all') {
                block.classList.remove('hidden');
            } else {
                block.classList.toggle('hidden', block.dataset.level !== currentFilter);
            }
        });

        sections.forEach(function(h2) {
            if (currentFilter === 'all') {
                h2.classList.remove('section-hidden');
                return;
            }
            var hasVisible = false;
            var sibling = h2.nextElementSibling;
            while (sibling) {
                if (sibling.tagName === 'H2' || sibling.tagName === 'HR') break;
                if (sibling.classList.contains('news-block') && !sibling.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            h2.classList.toggle('section-hidden', !hasVisible);
        });

        var hrs = document.querySelectorAll('.news-content hr');
        hrs.forEach(function(hr) {
            if (currentFilter === 'all') {
                hr.style.display = '';
                return;
            }
            var prev = hr.previousElementSibling;
            var prevVisible = false;
            var nextVisible = false;

            while (prev) {
                if (prev.tagName === 'HR') break;
                if ((prev.classList.contains('news-block') && !prev.classList.contains('hidden')) ||
                    (prev.tagName === 'H2' && !prev.classList.contains('section-hidden'))) {
                    prevVisible = true;
                    break;
                }
                prev = prev.previousElementSibling;
            }

            var next = hr.nextElementSibling;
            while (next) {
                if (next.tagName === 'HR') break;
                if ((next.classList.contains('news-block') && !next.classList.contains('hidden')) ||
                    (next.tagName === 'H2' && !next.classList.contains('section-hidden'))) {
                    nextVisible = true;
                    break;
                }
                next = next.nextElementSibling;
            }

            hr.style.display = (prevVisible && nextVisible) ? '' : 'none';
        });
    }

    // ========== PANEL ==========
    function togglePanel() {
        var o = document.getElementById('overlay');
        var p = document.getElementById('panel');
        var isOpen = o.classList.contains('show');
        if (isOpen) {
            o.classList.remove('show');
            p.style.display = 'none';
        } else {
            o.classList.add('show');
            p.style.display = 'block';
            scanFiles();
        }
    }

    async function scanFiles() {
        var el = document.getElementById('fileList');
        el.innerHTML = '<p style="color:var(--text-tertiary);font-size:12px;">' + t('scanning') + '</p>';
        var files = [];
        var today = new Date();
        for (var i = 0; i < 30; i++) {
            var d = new Date(today);
            d.setDate(d.getDate() - i);
            var ds = fmtDate(d);
            try {
                var r = await fetch('news/' + ds + '.md', { method: 'HEAD' });
                if (r.ok) files.push(ds);
            } catch(e){}
        }
        if (!files.length) {
            el.innerHTML = '<p style="color:var(--text-tertiary);font-size:12px;">' + t('no_archive') + '</p>';
            return;
        }
        el.innerHTML = files.map(function(f) {
            return '<div class="panel-item ' + (f===fmtDate(currentDate)?'active':'') + '" onclick="jumpTo(\'' + f + '\')">' + f + '</div>';
        }).join('');
    }

    function jumpTo(ds) {
        currentDate = new Date(ds + 'T00:00:00');
        if (currentMode === 'weekly') {
            setMode('daily');
        }
        document.getElementById('currentDate').innerHTML = displayDate(currentDate);
        loadNews(ds);
        togglePanel();
    }

    // ========== INIT ==========
    handleUrlParams(); // P0-NEW: Handle URL date params
    applyI18n();
    document.getElementById('currentDate').innerHTML = displayDate(currentDate);
    loadNews(fmtDate(currentDate));
</script>
